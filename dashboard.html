                    </div>
                    <h3 class="font-bold text-lg mb-1">${escapeHtml(job.title)}</h3>
                    <span class="text-sm text-[#D4A017]">${job.category}</span>
                    <p class="text-gray-600 text-sm mt-2 line-clamp-2">${escapeHtml(job.description?.substring(0, 100)) || 'Açıklama yok'}...</p>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t">
                        <div class="text-sm">
                            <span class="font-semibold">💰 ${job.salary_min || '?'} - ${job.salary_max || '?'} ${job.salary_currency || 'EUR'}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="viewJobDetail(${job.id})" class="text-blue-600 text-sm">Detay</button>
                            <button onclick="editJobModal(${job.id})" class="text-green-600 text-sm">Düzenle</button>
                            <button onclick="toggleJobStatus(${job.id}, ${!job.is_active})" class="text-yellow-600 text-sm">
                                ${job.is_active ? 'Pasif Yap' : 'Aktif Yap'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="col-span-full text-center text-gray-500 py-8">Henüz ilan eklenmemiş.</div>'}
        </div>
        
        <!-- Yeni İlan Modalı -->
        <div id="newJobModal" class="modal">
            <div class="modal-content" style="max-width: 600px;">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">➕ Yeni İlan Ekle</h2>
                    <button onclick="closeNewJobModal()" class="text-gray-500 text-2xl">&times;</button>
                </div>
                <form id="newJobForm" class="space-y-3">
                    <div>
                        <label class="block text-gray-700 mb-1">İlan Başlığı *</label>
                        <input type="text" id="jobTitle" class="w-full p-2 border rounded-lg" required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-700 mb-1">Kategori *</label>
                            <select id="jobCategory" class="w-full p-2 border rounded-lg" required>
                                <option value="">Seçiniz</option>
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-1">Ülke *</label>
                            <select id="jobCountry" class="w-full p-2 border rounded-lg" required>
                                <option value="">Seçiniz</option>
                                ${countries?.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-1">Şehir</label>
                        <input type="text" id="jobCity" class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-1">Açıklama</label>
                        <textarea id="jobDesc" rows="3" class="w-full p-2 border rounded-lg"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-1">Gereklilikler</label>
                        <textarea id="jobRequirements" rows="2" class="w-full p-2 border rounded-lg" placeholder="Vize, deneyim, yaş vb."></textarea>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label class="block text-gray-700 mb-1">Min. Maaş</label>
                            <input type="number" id="jobSalaryMin" class="w-full p-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-1">Max. Maaş</label>
                            <input type="number" id="jobSalaryMax" class="w-full p-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-1">Para Birimi</label>
                            <select id="jobSalaryCurrency" class="w-full p-2 border rounded-lg">
                                <option value="EUR">EUR</option>
                                <option value="USD">USD</option>
                                <option value="GBP">GBP</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="jobActive" checked>
                            <span>Hemen yayınla</span>
                        </label>
                    </div>
                    <button type="submit" class="btn-primary w-full">İlanı Yayınla</button>
                </form>
            </div>
        </div>
    `;
}

// Yeni İlan Ekleme
window.openNewJobModal = () => {
    const modal = document.getElementById('newJobModal');
    if (modal) modal.classList.add('active');
};

window.closeNewJobModal = () => {
    const modal = document.getElementById('newJobModal');
    if (modal) modal.classList.remove('active');
};

// İlan Kaydetme
document.addEventListener('submit', async (e) => {
    if (e.target.id === 'newJobForm') {
        e.preventDefault();
        
        // Temsilcinin şubesini bul
        let branchId = null;
        if (currentRole === 'representative') {
            const { data: repBranch } = await supabaseClient
                .from('representative_branches')
                .select('branch_id')
                .eq('representative_id', currentUser.id)
                .single();
            branchId = repBranch?.branch_id;
        }
        
        const { error } = await supabaseClient.from('job_postings').insert({
            branch_id: branchId,
            representative_id: currentUser.id,
            title: document.getElementById('jobTitle').value,
            category: document.getElementById('jobCategory').value,
            country_id: parseInt(document.getElementById('jobCountry').value),
            city: document.getElementById('jobCity').value,
            description: document.getElementById('jobDesc').value,
            requirements: document.getElementById('jobRequirements').value,
            salary_min: parseInt(document.getElementById('jobSalaryMin').value) || null,
            salary_max: parseInt(document.getElementById('jobSalaryMax').value) || null,
            salary_currency: document.getElementById('jobSalaryCurrency').value,
            is_active: document.getElementById('jobActive').checked
        });
        
        if (error) {
            showMessage('İlan eklenemedi: ' + error.message, 'error');
        } else {
            showMessage('İlan başarıyla eklendi!', 'success');
            closeNewJobModal();
            loadPage('job-management');
        }
    }
});
    
    // ========== INIT DASHBOARD ==========
function initDashboard() {
    renderSidebar();
    
    // URL'den page parametresini kontrol et
    const urlParams = new URLSearchParams(window.location.search);
    const pageParam = urlParams.get('page');
    
    if (pageParam === 'new-application') {
        loadPage('new-application');
    } else if (pageParam === 'visa-applications') {
        loadPage('visa-applications');
    } else if (pageParam === 'immigration-applications') {
        loadPage('immigration-applications');
    } else {
        // Varsayılan olarak dashboard
        loadPage('dashboard');
    }
}
    checkAuth();
  </script>
</body>
</html>
