// ========== RENDER SIDEBAR (AKORDİYONLU - DÜZELTİLMİŞ) ==========
function renderSidebar() {
  const menu = getMenuItems();
  const nav = document.getElementById('sidebar-nav');
  
  if (!nav) {
    console.error('Sidebar nav elementi bulunamadı');
    return;
  }
  
  let html = '';
  
  // Main menü öğeleri (Dashboard gibi)
  if (menu.main && menu.main.length > 0) {
    html += `<div class="space-y-1 mb-4">`;
    menu.main.forEach(item => {
      html += `
        <div class="sidebar-item p-2 rounded flex items-center gap-3" data-page="${item.id}">
          <i data-lucide="${item.icon}" class="w-5 h-5"></i>
          <span>${item.label}</span>
        </div>
      `;
    });
    html += `</div>`;
  }
  
  // Gruplandırılmış menüler (Akordiyon)
  if (menu.groups && menu.groups.length > 0) {
    menu.groups.forEach((group, index) => {
      const groupId = `accordion-${index}`;
      html += `
        <div class="accordion-group mb-2">
          <div class="accordion-header p-2 rounded flex items-center gap-3 cursor-pointer hover:bg-gray-100 transition" data-accordion="${groupId}">
            <i data-lucide="${group.icon}" class="w-5 h-5 text-gray-500"></i>
            <span class="font-medium text-gray-700 flex-1">${group.name}</span>
            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 transition-transform accordion-icon-${groupId}"></i>
          </div>
          <div id="${groupId}" class="accordion-content ml-6 space-y-1 mt-1 hidden">
      `;
      
      group.items.forEach(item => {
        html += `
          <div class="sidebar-item p-2 rounded flex items-center gap-3 pl-6" data-page="${item.id}">
            <i data-lucide="${item.icon}" class="w-4 h-4"></i>
            <span class="text-sm">${item.label}</span>
          </div>
        `;
      });
      
      html += `
          </div>
        </div>
      `;
    });
  }
  
  nav.innerHTML = html;
  
  // Lucide ikonlarını yenile
  if (typeof lucide !== 'undefined' && lucide.createIcons) {
    lucide.createIcons();
  }
  
  // Akordiyon event listener'ları
  document.querySelectorAll('.accordion-header').forEach(header => {
    header.addEventListener('click', () => {
      const accordionId = header.dataset.accordion;
      const content = document.getElementById(accordionId);
      const icon = document.querySelector(`.accordion-icon-${accordionId}`);
      
      if (content && content.classList.contains('hidden')) {
        // Tüm accordionları kapat
        document.querySelectorAll('.accordion-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('[class^="accordion-icon-"]').forEach(ic => {
          if (ic) ic.style.transform = 'rotate(0deg)';
        });
        
        // Seçili olanı aç
        content.classList.remove('hidden');
        if (icon) icon.style.transform = 'rotate(180deg)';
      } else if (content) {
        content.classList.add('hidden');
        if (icon) icon.style.transform = 'rotate(0deg)';
      }
    });
  });
  
  // Sidebar item tıklama
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      loadPage(el.dataset.page);
    });
  });
  
  // Sayfa yüklendiğinde aktif menüyü göster
  const activeItem = document.querySelector(`.sidebar-item[data-page="${currentPage}"]`);
  if (activeItem) {
    activeItem.classList.add('active');
    // Akordiyonu aç
    const parentContent = activeItem.closest('.accordion-content');
    if (parentContent) {
      parentContent.classList.remove('hidden');
      const accordionId = parentContent.id;
      const icon = document.querySelector(`.accordion-icon-${accordionId}`);
      if (icon) icon.style.transform = 'rotate(180deg)';
    }
  }
}
    // ========== PAGE LOADER (GÜNCELLENMİŞ - TAM) ==========
async function loadPage(pageId) {
  currentPage = pageId;
  const container = document.getElementById('dashboard-content');
  container.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>';
  
  const pageFunctions = {
    // ========== ANA SAYFALAR ==========
    'dashboard': () => renderDashboard(),
    'messages': () => renderMessages(),
    'profile': () => renderProfile(),
    'settings': () => renderSettings(),
    'complete-profile': () => renderCompleteProfile(),  // Profil tamamlama sayfası
    
    // ========== DANIŞMANLIK BAŞVURULARI ==========
    'my-applications': () => renderMyApplications(),
    'assigned-applications': () => renderAssignedApplications(),
    'applications': () => renderAllApplications(),
    'new-application': () => renderNewApplication(),  // Tek form (Danışmanlık/Vize/Göç seçmeli)
    
    // ========== VİZE BAŞVURULARI ==========
    'visa-applications': () => renderVisaApplications(),
    'new-visa-application': () => renderVisaApplicationForm(),  // Step akışlı Vize formu
    'visa-statistics': () => renderVisaStatistics(),
    'visa-settings': () => renderVisaSettings(),
    
    // ========== GÖÇ BAŞVURULARI ==========
    'immigration-applications': () => renderImmigrationApplications(),
    'new-immigration-application': () => renderImmigrationApplicationForm(),  // Step akışlı Göç formu
    'immigration-statistics': () => renderImmigrationStatistics(),
    'immigration-settings': () => renderImmigrationSettings(),
    
    // ========== YÖNETİM SAYFALARI ==========
    'users': () => renderUsers(),
    'branches': () => renderBranches(),
    'banks': () => renderBanks(),
    'services': () => renderServices(),
    'countries': () => renderCountries(),
    'documents': () => renderDocuments(),
    
    // ========== FİNANS SAYFALARI ==========
    'earnings': () => renderEarnings(),
    'commission-payments': () => renderCommissionPayments(),
    
    // ========== İLAN SAYFALARI ==========
    'job-management': () => renderJobManagement(),
    'accommodation-management': () => renderAccommodationManagement(),
    'business-management': () => renderBusinessManagement(),
    'job-listings': () => renderJobListingsForCustomer(),
    'accommodation-listings': () => renderAccommodationListingsForCustomer(),
    'business-listings': () => renderBusinessListingsForCustomer(),
    
    // ========== RANDEVU BOTU ==========
    'appointment-bot': () => renderAppointmentBotDashboard()
  };
  
  if (pageFunctions[pageId]) {
    container.innerHTML = await pageFunctions[pageId]();
  } else {
    container.innerHTML = '<div class="card text-center">Sayfa bulunamadı.</div>';
  }
  
  // Lucide ikonlarını yenile
  if (typeof lucide !== 'undefined' && lucide.createIcons) {
    lucide.createIcons();
  }
}

window.selectApplicationType = (type) => {
    console.log('Başvuru tipi seçildi:', type);
    
    localStorage.setItem('applicationType', type);
    document.getElementById('applicationType').value = type;
    
    // Kart görünümlerini güncelle
    document.querySelectorAll('.type-card').forEach(card => {
        if (card.dataset.type === type) {
            card.classList.add('border-[#D4A017]', 'bg-yellow-50');
            card.classList.remove('border-gray-200', 'bg-white');
        } else {
            card.classList.remove('border-[#D4A017]', 'bg-yellow-50');
            card.classList.add('border-gray-200', 'bg-white');
        }
    });
    
    // Form alanlarını göster/gizle
    const consultancyFields = document.getElementById('consultancyFields');
    const visaFields = document.getElementById('visaFields');
    const immigrationFields = document.getElementById('immigrationFields');
    
    if (consultancyFields) consultancyFields.classList.toggle('hidden', type !== 'consultancy');
    if (visaFields) visaFields.classList.toggle('hidden', type !== 'visa');
    if (immigrationFields) immigrationFields.classList.toggle('hidden', type !== 'immigration');
    
    // Belgeleri yenile
    if (type === 'consultancy') {
        const countryId = document.getElementById('countrySelect')?.value;
        if (countryId) loadConsultancyDocuments(countryId);
    } else if (type === 'visa') {
        const country = document.getElementById('visaCountry')?.value;
        if (country) loadVisaDocuments(country);
    } else if (type === 'immigration') {
        const countryId = document.getElementById('immCountry')?.value;
        if (countryId) loadImmigrationDocuments(countryId);
    }
    
    // AI skoru güncelle
    updateAIScoreByType(type);
    
    // Fiyatı güncelle
    updatePriceByType(type);
    
    // URL'yi güncelle
    try {
        const url = new URL(window.location);
        url.searchParams.set('type', type);
        window.history.replaceState({}, '', url);
    } catch (e) {
        console.log('URL güncellenemedi');
    }
};

document.addEventListener('submit', async (e) => {

        const fee = parseFloat(selectedOption?.dataset?.fee) || 1500;
        
        const formData = {

            total_price_eur: fee,

        };
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> Başvuru gönderiliyor...';
        
        try {

            if (error) throw error;
            
            showMessage(`✅ Göç başvurunuz başarıyla alındı! Başvuru No: #${data.id}`, 'success');

            submitBtn.innerHTML = originalText;

window.saveImmigrationSettings = async (countryId) => {
    const isActive = document.getElementById(`imm_active_${countryId}`).checked;
    const processingDays = document.getElementById(`imm_days_${countryId}`).value;
    const successRate = document.getElementById(`imm_rate_${countryId}`).value;
    const immigrationFee = document.getElementById(`imm_fee_${countryId}`).value;
    
    const { error } = await supabaseClient
        .from('countries')
        .update({
            immigration_active: isActive,
            immigration_processing_days: parseInt(processingDays),
            immigration_success_rate: parseFloat(successRate),
            immigration_fee_eur: parseFloat(immigrationFee)
        })
        .eq('id', countryId);
    
    if (error) {
        showMessage('Kaydedilemedi: ' + error.message, 'error');
    } else {
        showMessage('✅ Göç ayarları kaydedildi', 'success');
    }
};

    // ========== GÖÇ İSTATİSTİKLERİ ==========
async function renderImmigrationStatistics() {
    const { data: stats } = await supabaseClient
        .from('immigration_applications')
        .select('status, country:country_id(name)');
    
    const total = stats?.length || 0;
    const approved = stats?.filter(s => s.status === 'approved').length || 0;
    const rejected = stats?.filter(s => s.status === 'rejected').length || 0;
    const pending = stats?.filter(s => s.status === 'pending').length || 0;
    
    // Ülke bazlı istatistikler
    const countryStats = {};
    stats?.forEach(s => {
        const countryName = s.country?.name || 'Belirsiz';
        if (!countryStats[countryName]) countryStats[countryName] = { total: 0, approved: 0 };
        countryStats[countryName].total++;
        if (s.status === 'approved') countryStats[countryName].approved++;
    });
    
    return `
        <h1 class="text-2xl font-bold mb-6">📊 Göç İstatistikleri</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Toplam Başvuru</div></div>
            <div class="stat-card"><div class="stat-number text-green-600">${approved}</div><div class="stat-label">Onaylanan</div></div>
            <div class="stat-card"><div class="stat-number text-red-600">${rejected}</div><div class="stat-label">Reddedilen</div></div>
            <div class="stat-card"><div class="stat-number text-yellow-600">${pending}</div><div class="stat-label">Bekleyen</div></div>
        </div>
        
        <div class="card">
            <h3 class="font-semibold text-lg mb-3">🌍 Ülke Bazlı Başarı Oranları</h3>
            <div class="space-y-2">
                ${Object.entries(countryStats).map(([country, data]) => `
                    <div class="flex justify-between items-center">
                        <span class="w-32">${country}</span>
                        <div class="flex-1 mx-4">
                            <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                                <div class="h-full bg-[#D4A017] rounded-full" style="width: ${data.total > 0 ? (data.approved / data.total * 100) : 0}%"></div>
                            </div>
                        </div>
                        <span class="text-sm font-medium">${data.total > 0 ? Math.round(data.approved / data.total * 100) : 0}% (${data.approved}/${data.total})</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

window.saveVisaSettings = async (countryId) => {
    const isActive = document.getElementById(`visa_active_${countryId}`).checked;
    const processingDays = document.getElementById(`visa_days_${countryId}`).value;
    const successRate = document.getElementById(`visa_rate_${countryId}`).value;
    const visaFee = document.getElementById(`visa_fee_${countryId}`).value;
    
    const { error } = await supabaseClient
        .from('countries')
        .update({
            visa_active: isActive,
            visa_processing_days: parseInt(processingDays),
            visa_success_rate: parseFloat(successRate),
            visa_fee_eur: parseFloat(visaFee),
            last_visa_update: new Date()
        })
        .eq('id', countryId);
    
    if (error) {
        showMessage('Kaydedilemedi: ' + error.message, 'error');
    } else {
        showMessage('✅ Vize ayarları kaydedildi', 'success');
    }
};

    // ========== HAKEDİŞ HESAPLAMA (Maaş + Komisyon) ==========
async function calculateEarnings(applicationId, applicationType, totalAmount, commissionRate) {
    // Temsilcinin sabit maaşını al
    const { data: profile } = await supabaseClient
        .from('profiles')
        .select('base_salary_eur, commission_rate')
        .eq('id', currentUser.id)
        .single();
    
    const baseSalary = profile?.base_salary_eur || 0;
    const userCommissionRate = profile?.commission_rate || commissionRate || 10;
    const commissionAmount = totalAmount * (userCommissionRate / 100);
    
    // Hakediş kaydı oluştur
    const { error } = await supabaseClient.from('earnings').insert({
        branch_id: null, // Şube ID'si alınabilir
        application_id: applicationId,
        application_type: applicationType, // 'consultancy', 'visa', 'immigration'
        representative_id: currentUser.id,
        amount_eur: totalAmount,
        base_salary_eur: baseSalary,
        commission_amount_eur: commissionAmount,
        paid_amount_eur: 0,
        remaining_amount_eur: commissionAmount,
        status: 'pending'
    });
    
    if (error) {
        console.error('Hakediş oluşturulamadı:', error);
    }
    
    return { baseSalary, commissionAmount };
}

// AI skor hesaplama (Göç için)
async function calculateImmigrationAIScore() {
    const education = document.getElementById('immEducation')?.value || '';
    const experience = parseInt(document.getElementById('immExperience')?.value) || 0;
    const monthlyIncome = parseFloat(document.getElementById('immMonthlyIncome')?.value) || 0;
    const bankBalance = parseFloat(document.getElementById('immBankBalance')?.value) || 0;
    const hasJobOffer = document.getElementById('immHasJobOffer')?.checked || false;
    const languageLevel = document.getElementById('immLanguage')?.value || '';
    
    let score = 50;
    
    // Eğitim puanı (max 15)
    const eduScores = { 'Doktora': 15, 'Yüksek Lisans': 12, 'Lisans': 10, 'Ön Lisans': 7, 'Lise': 5 };
    score += eduScores[education] || 0;
    
    // İş tecrübesi (max 15)
    score += Math.min(15, experience * 2);
    
    // Gelir (max 15)
    if (monthlyIncome >= 3000) score += 15;
    else if (monthlyIncome >= 2000) score += 10;
    else if (monthlyIncome >= 1000) score += 5;
    
    // Banka bakiyesi (max 10)
    if (bankBalance >= 10000) score += 10;
    else if (bankBalance >= 5000) score += 5;
    
    // İş teklifi (10)
    if (hasJobOffer) score += 10;
    
    // Dil seviyesi (max 10)
    const langScores = { 'C2': 10, 'C1': 8, 'B2': 6, 'B1': 4, 'A2': 2, 'A1': 1 };
    score += langScores[languageLevel] || 0;
    
    const finalScore = Math.min(100, Math.max(0, score));
    const riskLevel = finalScore >= 75 ? 'Low' : (finalScore >= 50 ? 'Medium' : 'High');
    
    let suggestion = '';
    if (finalScore < 50) {
        suggestion = '⚠️ Uygunluk skorunuz düşük. Dil seviyenizi yükseltmeniz ve iş teklifi almanız önerilir.';
    } else if (finalScore < 70) {
        suggestion = '📌 Uygunluk skorunuz orta. Ek belgelerle başvurunuzu güçlendirebilirsiniz.';
    } else {
        suggestion = '✅ Uygunluk skorunuz yüksek. Başvurunuz için uygun görünüyorsunuz.';
    }
    
    return { score: finalScore, riskLevel, suggestion };
}

    .select('*')
    .eq('id', serviceId)
    .single();
  
  if (!service) {
    showMessage('Hizmet bulunamadı', 'error');
    return;
  }
  
  document.getElementById('editServiceId').value = service.id;
  document.getElementById('editServiceName').value = service.name;
  document.getElementById('editServiceDesc').value = service.description || '';
  document.getElementById('editServicePrice').value = service.price_eur;
  document.getElementById('editServiceCommission').value = service.commission_amount_eur;
  document.getElementById('editServiceCountry').value = service.country_id;
  
  const modal = document.getElementById('editServiceModal');
  modal.classList.add('active');
};

document.addEventListener('submit', async (e) => {
  if (e.target.id === 'editServiceForm') {
    e.preventDefault();
    const serviceId = document.getElementById('editServiceId').value;
    
    const { error } = await supabaseClient
      .from('services')
      .update({
        name: document.getElementById('editServiceName').value,
        description: document.getElementById('editServiceDesc').value,
        price_eur: parseFloat(document.getElementById('editServicePrice').value),
        commission_amount_eur: parseFloat(document.getElementById('editServiceCommission').value),
        country_id: parseInt(document.getElementById('editServiceCountry').value),
        updated_at: new Date()
      })
      .eq('id', parseInt(serviceId));
    
    if (error) {
      showMessage('Hizmet güncellenemedi: ' + error.message, 'error');
    } else {
      showMessage('Hizmet güncellendi', 'success');
      closeEditServiceModal();
      loadPage('services');
    }
  }
});

// ========== VİZE BAŞVURU AI ANALİZ FONKSİYONU ==========
let currentVisaStep = 1;
let currentAIScore = null;
let requiredDocuments = [];

async function analyzeVisaEligibility(country, visaType, userData) {
    // Simüle edilmiş AI analizi (Gerçek API ile değiştirilebilir)
    const countryRisk = { 'Germany': 'Low', 'France': 'Low', 'Italy': 'Medium', 'Spain': 'Low', 'USA': 'High', 'UK': 'Medium' };
    const successRates = { 'Germany': 85, 'France': 82, 'Italy': 70, 'Spain': 88, 'USA': 65, 'UK': 72 };
    
    let baseScore = 70;
    
    // Pasaport kontrolü
    const passportNum = userData.passportNumber || '';
    if (passportNum.match(/^[A-Z]{2}\d{8}$/)) baseScore += 10;
    else if (passportNum.length > 5) baseScore += 5;
    else baseScore -= 10;
    
    // Ülke bazlı
    const risk = countryRisk[country] || 'Medium';
    if (risk === 'Low') baseScore += 10;
    else if (risk === 'High') baseScore -= 15;
    
    // Vize tipi bazlı
    if (visaType === 'Tourist') baseScore += 5;
    else if (visaType === 'Student') baseScore += 10;
    else if (visaType === 'Work') baseScore += 0;
    else baseScore -= 5;
    
    const finalScore = Math.min(100, Math.max(0, baseScore));
    const riskLevel = finalScore >= 75 ? 'Low' : (finalScore >= 50 ? 'Medium' : 'High');
    const successRate = successRates[country] || 75;
    
    let suggestion = '';
    if (finalScore < 50) {
        suggestion = `⚠️ ${country} için uygunluk skorunuz düşük. Önerilen ülke: İspanya (%88 başarı oranı ile daha yüksek şans).`;
    } else if (finalScore < 70) {
        suggestion = `📌 ${country} başvurunuz için ek belgeler hazırlamanız önerilir. Seyahat sigortası ve banka hesap dökümü ekleyin.`;
    } else {
        suggestion = `✅ ${country} için başvuru şansınız yüksek. Belgelerinizi eksiksiz hazırlayın.`;
    }
    
    return { score: finalScore, riskLevel, successRate, suggestion };
}

async function updateAIScore() {
    const country = document.getElementById('visaCountry')?.value;
    const visaType = document.getElementById('visaType')?.value;
    const fullName = document.getElementById('visaFullName')?.value;
    const passportNumber = document.getElementById('visaPassportNumber')?.value;
    
    if (!country || !visaType) return;
    
    const analysis = await analyzeVisaEligibility(country, visaType, { fullName, passportNumber });
    currentAIScore = analysis;
    
    const circle = document.getElementById('aiScoreCircle');
    const scoreValue = document.getElementById('aiScoreValue');
    const scoreLabel = document.getElementById('aiScoreLabel');
    const scoreDetail = document.getElementById('aiScoreDetail');
    const suggestionsDiv = document.getElementById('aiSuggestions');
    const suggestionText = document.getElementById('aiSuggestionText');
    
    if (circle) {
        const circumference = 364.4;
        const offset = circumference - (analysis.score / 100) * circumference;
        circle.style.strokeDashoffset = offset;
    }
    if (scoreValue) scoreValue.textContent = analysis.score;
    if (scoreLabel) {
        scoreLabel.innerHTML = analysis.riskLevel === 'Low' ? '✅ Yüksek Uygunluk' : (analysis.riskLevel === 'Medium' ? '⚠️ Orta Uygunluk' : '❌ Düşük Uygunluk');
        scoreLabel.className = `mt-3 text-lg font-semibold ${analysis.riskLevel === 'Low' ? 'text-green-600' : (analysis.riskLevel === 'Medium' ? 'text-yellow-600' : 'text-red-600')}`;
    }
    if (scoreDetail) scoreDetail.innerHTML = `📊 Tahmini başarı oranı: %${analysis.successRate} | Risk seviyesi: ${analysis.riskLevel}`;
    if (suggestionsDiv && suggestionText) {
        if (analysis.suggestion) {
            suggestionsDiv.classList.remove('hidden');
            suggestionText.innerHTML = analysis.suggestion;
        } else {
            suggestionsDiv.classList.add('hidden');
        }
    }
}

// ========== VİZE BAŞVURU STEP NAVIGASYONU ==========
function updateProgressBar() {
    const totalSteps = 7;
    const progress = (currentVisaStep / totalSteps) * 100;
    const progressBar = document.getElementById('progressBar');
    if (progressBar) progressBar.style.width = `${progress}%`;
    
    // Step indicator güncelleme
    document.querySelectorAll('.step-indicator').forEach(el => {
        const step = parseInt(el.dataset.step);
        if (step <= currentVisaStep) {
            el.classList.add('text-[#D4A017]', 'font-bold');
            el.classList.remove('text-gray-400');
        } else {
            el.classList.remove('text-[#D4A017]', 'font-bold');
            el.classList.add('text-gray-400');
        }
    });
}

function nextVisaStep() {
    const currentContent = document.querySelector(`.step-content[data-step="${currentVisaStep}"]`);
    if (currentContent) currentContent.style.display = 'none';
    
    if (currentVisaStep === 6) {
        // Özet sayfasını göster
        const summaryContent = document.querySelector(`.step-content[data-step="summary"]`);
        if (summaryContent) {
            summaryContent.style.display = 'block';
            generateVisaSummary();
        }
        const nextBtn = document.getElementById('nextStepBtn');
        const prevBtn = document.getElementById('prevStepBtn');
        if (nextBtn) nextBtn.style.display = 'none';
        if (prevBtn) prevBtn.classList.remove('hidden');
        currentVisaStep = 7;
    } else {
        currentVisaStep++;
        const nextContent = document.querySelector(`.step-content[data-step="${currentVisaStep}"]`);
        if (nextContent) {
            nextContent.style.display = 'block';
            
            // Step'e özel işlemler
            if (currentVisaStep === 3) updateAIScore();
            if (currentVisaStep === 4) loadVisaDocuments();
        }
        
        const prevBtn = document.getElementById('prevStepBtn');
        if (prevBtn) prevBtn.classList.remove('hidden');
    }
    
    updateProgressBar();
}

function previousVisaStep() {
    if (currentVisaStep === 7) {
        const summaryContent = document.querySelector(`.step-content[data-step="summary"]`);
        if (summaryContent) summaryContent.style.display = 'none';
        currentVisaStep = 6;
        const nextBtn = document.getElementById('nextStepBtn');
        if (nextBtn) nextBtn.style.display = 'block';
    } else if (currentVisaStep > 1) {
        const currentContent = document.querySelector(`.step-content[data-step="${currentVisaStep}"]`);
        if (currentContent) currentContent.style.display = 'none';
        currentVisaStep--;
        const prevContent = document.querySelector(`.step-content[data-step="${currentVisaStep}"]`);
        if (prevContent) prevContent.style.display = 'block';
    }
    
    if (currentVisaStep === 1) {
        const prevBtn = document.getElementById('prevStepBtn');
        if (prevBtn) prevBtn.classList.add('hidden');
    }
    
    updateProgressBar();
}

            total_price_eur: 250, // Vize ücreti sabit
            ai_score: currentAIScore?.score || 0,
            ai_risk_level: currentAIScore?.riskLevel || 'Medium',
            ai_suggestion: currentAIScore?.suggestion || '',
            status: 'pending'
        };
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> Başvuru gönderiliyor...';
        
        try {
            const { data: visaApp, error } = await supabaseClient
                .from('visa_applications')
                .insert(formData)
                .select()
                .single();
            
            if (error) throw error;
            
            // AI analizini kaydet
            if (currentAIScore) {
                await supabaseClient.from('visa_ai_analysis').insert({
                    visa_application_id: visaApp.id,
                    score: currentAIScore.score,
                    risk_level: currentAIScore.riskLevel,
                    analysis_data: currentAIScore
                });
            }
            
            showMessage(`✅ Vize başvurunuz başarıyla alındı! Başvuru No: #${visaApp.id}`, 'success');
            
            setTimeout(() => {
                loadPage('visa-applications');
            }, 2000);
            
        } catch (error) {
            console.error('Vize başvuru hatası:', error);
            showMessage('Başvuru gönderilemedi: ' + error.message, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    }
});

// ========== STEP NAVIGASYON ==========
function nextVisaStep() {
    if (currentVisaStep < visaTotalSteps) {
        // Step kontrolü
        if (currentVisaStep === 2) {
            const country = document.getElementById('visaCountry')?.value;
            if (!country) {
                showMessage('Lütfen hedef ülke seçin', 'error');
                return;
            }
            loadVisaDocumentsByCountry(country);
        }
        
        document.getElementById(`visaStep${currentVisaStep}`).classList.add('hidden');
        currentVisaStep++;
        document.getElementById(`visaStep${currentVisaStep}`).classList.remove('hidden');
        updateVisaStepIndicator();
        
        if (currentVisaStep === 4) updateVisaPrice();
    }
}

function prevVisaStep() {
    if (currentVisaStep > 1) {
        document.getElementById(`visaStep${currentVisaStep}`).classList.add('hidden');
        currentVisaStep--;
        document.getElementById(`visaStep${currentVisaStep}`).classList.remove('hidden');
        updateVisaStepIndicator();
    }
}

function updateVisaStepIndicator() {
    document.querySelectorAll('.step-item').forEach((item, index) => {
        if (index + 1 <= currentVisaStep) item.classList.add('active');
        else item.classList.remove('active');
    });
    document.querySelectorAll('.step-line').forEach((line, index) => {
        if (index + 1 < currentVisaStep) line.classList.add('active');
        else line.classList.remove('active');
    });
}

// ========== BELGELERİ YÜKLE ==========
async function loadVisaDocumentsByCountry(countryId) {
    const serviceId = document.getElementById('visaServiceId')?.value;
    if (!serviceId) return;
    
    const container = document.getElementById('visaDocumentsContainer');
    if (!container) return;
    
    // 1. Hizmete ait ortak belgeler
    const { data: commonDocs } = await supabaseClient
        .from('documents')
        .select('*')
        .eq('service_id', parseInt(serviceId));
    
    // 2. Ülkeye özel belgeler
    const { data: countryDocs } = await supabaseClient
        .from('country_documents')
        .select('*')
        .eq('country_id', parseInt(countryId));
    
    const allDocs = [...(commonDocs || []), ...(countryDocs || [])];
    
    if (allDocs.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-center py-4">Bu başvuru için belge gereksinimi bulunmuyor.</p>';
        return;
    }
    
    container.innerHTML = allDocs.map(doc => `
        <div class="border rounded-lg p-3 ${doc.is_required ? 'border-l-4 border-l-red-500' : ''}">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <label class="font-medium text-sm ${doc.is_required ? 'text-red-600' : ''}">
                        ${escapeHtml(doc.name || doc.document_name)} ${doc.is_required ? '*' : ''}
                    </label>
                    <p class="text-xs text-gray-500">${escapeHtml(doc.description) || 'Açıklama yok'}</p>
                </div>
                <div class="flex gap-2">
                    <input type="file" data-doc-id="${doc.id}" data-doc-name="${doc.name || doc.document_name}" 
                           class="visaDocFile text-sm" accept=".pdf,.jpg,.png" style="display: none;">
                    <button type="button" onclick="this.previousElementSibling.click()" 
                            class="text-blue-600 text-xs border border-blue-600 rounded px-2 py-1">
                        📎 Yükle
                    </button>
                    <span id="visaDocStatus_${doc.id}" class="text-xs px-2 py-1 rounded status-missing">Eksik</span>
                </div>
            </div>
            <div id="visaDocInfo_${doc.id}" class="text-xs text-gray-400 mt-1"></div>
        </div>
    `).join('');
}

// ========== FİYAT GÜNCELLEME ==========
function updateVisaPrice() {
    const countrySelect = document.getElementById('visaCountry');
    const selectedOption = countrySelect?.options[countrySelect.selectedIndex];
    const fee = parseFloat(selectedOption?.dataset?.fee) || 80;
    const commission = fee * 0.10;
    const total = fee + commission;
    
    document.getElementById('visaBaseAmount').innerHTML = `€${fee.toFixed(2)}`;
    document.getElementById('visaCommissionAmount').innerHTML = `€${commission.toFixed(2)}`;
    document.getElementById('visaTotalAmount').innerHTML = `€${total.toFixed(2)}`;
}

// ========== ÜLKE BİLGİLERİNİ GÖSTER ==========
function updateVisaCountryInfo() {
    const select = document.getElementById('visaCountry');
    const option = select?.options[select.selectedIndex];
    const days = option?.dataset?.days;
    const rate = option?.dataset?.rate;
    
    const infoBox = document.getElementById('visaCountryInfo');
    const daysSpan = document.getElementById('visaProcessDays');
    const rateSpan = document.getElementById('visaSuccessRate');
    
    if (option?.value && infoBox) {
        infoBox.classList.remove('hidden');
        if (daysSpan) daysSpan.innerHTML = `${days} gün`;
        if (rateSpan) rateSpan.innerHTML = `%${rate}`;
    } else if (infoBox) {
        infoBox.classList.add('hidden');
    }
}

// ========== DOSYA SEÇİMİ ==========
document.addEventListener('change', (e) => {
    if (e.target.classList && e.target.classList.contains('visaDocFile')) {
        const file = e.target.files[0];
        if (!file) return;
        
        const docId = e.target.dataset.docId;
        const docName = e.target.dataset.docName;
        const statusSpan = document.getElementById(`visaDocStatus_${docId}`);
        const infoSpan = document.getElementById(`visaDocInfo_${docId}`);
        
        if (statusSpan) {
            statusSpan.className = 'text-xs px-2 py-1 rounded status-uploaded';
            statusSpan.innerHTML = '✅ Seçildi';
        }
        if (infoSpan) {
            infoSpan.innerHTML = `📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        }
        
        if (!window.visaUploadedFiles) window.visaUploadedFiles = {};
        window.visaUploadedFiles[docId] = { file, docName };
    }
    
    // Ülke değişince
    if (e.target.id === 'visaCountry') {
        updateVisaCountryInfo();
        updateVisaPrice();
        const countryId = e.target.value;
        if (countryId) loadVisaDocumentsByCountry(countryId);
    }
    
    // Ödeme yöntemi değişince
    if (e.target.type === 'radio' && e.target.name === 'visaPayment') {
        const bankInfo = document.getElementById('visaBankInfo');
        const cardInfo = document.getElementById('visaCardInfo');
        if (e.target.value === 'bank') {
            if (bankInfo) bankInfo.style.display = 'block';
            if (cardInfo) cardInfo.style.display = 'none';
        } else {
            if (bankInfo) bankInfo.style.display = 'none';
            if (cardInfo) cardInfo.style.display = 'block';
        }
    }
});

// ========== FORM SUBMIT ==========
document.addEventListener('submit', async (e) => {
    if (e.target.id === 'visaStepForm') {
        e.preventDefault();
        
        const countrySelect = document.getElementById('visaCountry');
        const selectedOption = countrySelect?.options[countrySelect.selectedIndex];
        const countryId = countrySelect?.value;
        const countryName = selectedOption?.dataset?.name;
        const baseFee = parseFloat(selectedOption?.dataset?.fee) || 80;
        const commission = baseFee * 0.10;
        const totalPrice = baseFee + commission;
        
        // Profil bilgilerini al
        const { data: profile } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', currentUser.id)
            .single();
        
        const formData = {
            user_id: currentUser.id,
            application_type: 'visa',
            service_id: parseInt(document.getElementById('visaServiceId').value),
            country_id: parseInt(countryId),
            full_name: profile?.full_name,
            passport_number: profile?.passport_number,
            passport_expiry: profile?.passport_expiry,
            nationality: 'Turkey',
            date_of_birth: profile?.birth_date,
            phone: profile?.phone,
            email: currentUser.email,
            visa_type: document.getElementById('visaType')?.value,
            total_price_eur: totalPrice,
            commission_amount_eur: commission,
            payment_method: document.querySelector('input[name="visaPayment"]:checked')?.value === 'bank' ? 'bank_transfer' : 'credit_card',
            status: 'pending',
            payment_status: 'pending'
        };
        
        if (!formData.country_id || !formData.visa_type) {
            showMessage('Lütfen tüm zorunlu alanları doldurun', 'error');
            return;
        }
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="loading-spinner w-4 h-4"></div> Gönderiliyor...';
        
        try {
            // Başvuruyu kaydet
            const { data: app, error } = await supabaseClient
                .from('unified_applications')
                .insert(formData)
                .select()
                .single();
            
            if (error) throw error;
            
            // Belgeleri topla
            const fileInputs = document.querySelectorAll('.visaDocFile');
            const files = [];
            for (const input of fileInputs) {
                if (input.files && input.files[0]) {
                    files.push(input.files[0]);
                }
            }
            
            if (files.length > 0) {
                const { pdfFile } = await convertAllToSinglePDF(files, app.id);
                await uploadPDFToSupabase(pdfFile, app.id, { application_id: app.id });
            }
            
            showMessage(`✅ Başvuru #${app.id} başarıyla alındı!`, 'success');
            
            setTimeout(() => {
                loadPage('visa-applications');
            }, 2000);
            
        } catch (error) {
            console.error('Hata:', error);
            showMessage('Başvuru gönderilemedi: ' + error.message, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    }
});

// Navigasyon fonksiyonları (Vize ile aynı mantık)
function nextImmStep() { if (currentImmStep < immTotalSteps) { if (currentImmStep === 2) loadImmDocuments(); document.getElementById(`immStep${currentImmStep}`).classList.add('hidden'); currentImmStep++; document.getElementById(`immStep${currentImmStep}`).classList.remove('hidden'); if (currentImmStep === 4) updateImmPrice(); updateImmStepIndicator(); } }
function prevImmStep() { if (currentImmStep > 1) { document.getElementById(`immStep${currentImmStep}`).classList.add('hidden'); currentImmStep--; document.getElementById(`immStep${currentImmStep}`).classList.remove('hidden'); updateImmStepIndicator(); } }
function updateImmStepIndicator() { document.querySelectorAll('#immStepForm .step-item').forEach((item, i) => { if (i + 1 <= currentImmStep) item.classList.add('active'); else item.classList.remove('active'); }); document.querySelectorAll('#immStepForm .step-line').forEach((line, i) => { if (i + 1 < currentImmStep) line.classList.add('active'); else line.classList.remove('active'); }); }
function updateImmPrice() { const select = document.getElementById('immCountry'); const fee = parseFloat(select?.options[select.selectedIndex]?.dataset?.fee) || 1500; const commission = fee * 0.10; document.getElementById('immBaseAmount').innerHTML = `€${fee.toFixed(2)}`; document.getElementById('immCommissionAmount').innerHTML = `€${commission.toFixed(2)}`; document.getElementById('immTotalAmount').innerHTML = `€${(fee + commission).toFixed(2)}`; }
async function loadImmDocuments() { const countryId = document.getElementById('immCountry')?.value; const serviceId = document.getElementById('immServiceId')?.value; if (!countryId || !serviceId) return; const { data: commonDocs } = await supabaseClient.from('documents').select('*').eq('service_id', parseInt(serviceId)); const { data: countryDocs } = await supabaseClient.from('country_documents').select('*').eq('country_id', parseInt(countryId)); const allDocs = [...(commonDocs || []), ...(countryDocs || [])]; const container = document.getElementById('immDocumentsContainer'); if (!allDocs.length) { container.innerHTML = '<p class="text-gray-500 text-center py-4">Belge gereksinimi yok</p>'; return; } container.innerHTML = allDocs.map(doc => `<div class="border rounded-lg p-3"><div class="flex justify-between"><div><label class="font-medium text-sm">${escapeHtml(doc.name || doc.document_name)}</label><p class="text-xs text-gray-500">${escapeHtml(doc.description) || ''}</p></div><div><input type="file" data-doc-id="${doc.id}" class="immDocFile text-sm" style="display:none"><button type="button" onclick="this.previousElementSibling.click()" class="text-blue-600 text-xs border px-2 py-1 rounded">📎 Yükle</button><span id="immDocStatus_${doc.id}" class="text-xs ml-2 px-2 py-1 rounded status-missing">Eksik</span></div></div><div id="immDocInfo_${doc.id}" class="text-xs text-gray-400 mt-1"></div></div>`).join(''); }
document.addEventListener('change', (e) => { if (e.target.classList?.contains('immDocFile')) { const file = e.target.files[0]; if (!file) return; const docId = e.target.dataset.docId; const statusSpan = document.getElementById(`immDocStatus_${docId}`); const infoSpan = document.getElementById(`immDocInfo_${docId}`); if (statusSpan) { statusSpan.className = 'text-xs px-2 py-1 rounded status-uploaded'; statusSpan.innerHTML = '✅ Seçildi'; } if (infoSpan) infoSpan.innerHTML = `📄 ${file.name}`; if (!window.immUploadedFiles) window.immUploadedFiles = {}; window.immUploadedFiles[docId] = { file }; } if (e.target.id === 'immCountry') updateImmPrice(); if (e.target.type === 'radio' && e.target.name === 'immPayment') { const bankInfo = document.getElementById('immBankInfo'); const cardInfo = document.getElementById('immCardInfo'); if (e.target.value === 'bank') { if (bankInfo) bankInfo.style.display = 'block'; if (cardInfo) cardInfo.style.display = 'none'; } else { if (bankInfo) bankInfo.style.display = 'none'; if (cardInfo) cardInfo.style.display = 'block'; } } });

                        <div class="border-t pt-2">
                            <h4 class="font-semibold mb-2">📎 Belgeler</h4>
                            ${docs?.length ? docs.map(d => `
                                <div class="flex justify-between items-center p-2 bg-gray-50 rounded mb-1">
                                    <span>${d.document_name}</span>
                                    <span class="text-xs ${d.status === 'verified' ? 'text-green-600' : (d.status === 'uploaded' ? 'text-yellow-600' : 'text-red-600')}">
                                        ${d.status === 'verified' ? '✓ Onaylı' : (d.status === 'uploaded' ? '⏳ Yüklendi' : '❌ Eksik')}

async function renderAccommodationListingsForCustomer() {

    return `

                </select>
                <select id="accommodationTypeFilter" class="p-2 border rounded-lg">
                    <option value="all">Tüm Tipler</option>
                    ${types.map(t => `<option value="${t}">${t}</option>`).join('')}

                <button onclick="filterAccommodationListings()" class="btn-primary">Filtrele</button>

function renderAccommodationCards(accommodations) {
    if (!accommodations || accommodations.length === 0) {
        return '<div class="col-span-full text-center text-gray-500 py-8">Henüz konaklama ilanı bulunmamaktadır.</div>';
    }
    
    return accommodations.map(acc => `
        <div class="card hover:shadow-lg transition overflow-hidden">
            <div class="h-48 bg-cover bg-center" style="background-image: url('${acc.image_url || 'https://placehold.co/400x300?text=' + acc.type}')"></div>
            <div class="p-4">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs px-2 py-1 bg-purple-100 text-purple-700 rounded-full">${acc.type}</span>
                    <div class="flex items-center gap-1">
                        <span class="text-yellow-500">★</span>
                        <span class="text-sm">${acc.rating || 'Yeni'}</span>
                    </div>
                </div>
                <h3 class="font-bold text-lg mb-1">${escapeHtml(acc.title)}</h3>
                <p class="text-gray-500 text-sm flex items-center gap-1">
                    <img src="https://flagcdn.com/w20/${acc.country?.code?.toLowerCase()}.png" class="w-4 h-3 inline" onerror="this.style.display='none'">
                    ${acc.country?.name}${acc.city ? ', ' + acc.city : ''}
                </p>
                <p class="text-gray-600 text-sm line-clamp-2 mt-2">${escapeHtml(acc.description?.substring(0, 100)) || 'Açıklama yok'}...</p>
                <div class="flex justify-between items-center mt-3 pt-3 border-t">
                    <span class="text-[#D4A017] font-semibold">€${acc.price_per_night || '?'}/gece</span>
                    <button onclick="showAccommodationDetail(${acc.id})" class="text-blue-600 text-sm border border-blue-600 rounded-lg px-3 py-1 hover:bg-blue-50 transition">Detay</button>
                </div>
            </div>
        </div>
    `).join('');
}

                    ${types.map(t => `<option value="${t}">${t}</option>`).join('')}
                </select>
                <button onclick="filterBusinessListings()" class="btn-primary">Filtrele</button>
            </div>
        </div>
        
        <div id="businessListingsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${renderBusinessCards(businesses || [])}
        </div>
        
        <!-- İşletme Detay Modalı -->

            <div class="modal-content" style="max-width: 600px;">

                    <button onclick="closeBusinessDetailModal()" class="btn-secondary flex-1">Kapat</button>
                </div>
            </div>
        </div>
    `;
}

function renderBusinessCards(businesses) {
    if (!businesses || businesses.length === 0) {
        return '<div class="col-span-full text-center text-gray-500 py-8">Henüz işletme ilanı bulunmamaktadır.</div>';
    }
    
    return businesses.map(business => `
        <div class="card hover:shadow-lg transition overflow-hidden">
            <div class="h-48 bg-cover bg-center" style="background-image: url('${business.image_url || 'https://placehold.co/400x300?text=' + business.type}')"></div>
            <div class="p-4">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs px-2 py-1 bg-orange-100 text-orange-700 rounded-full">${business.type}</span>
                    <div class="flex items-center gap-1">
                        <span class="text-yellow-500">★</span>
                        <span class="text-sm">${business.rating || 'Yeni'}</span>
                    </div>
                </div>
                <h3 class="font-bold text-lg mb-1">${escapeHtml(business.name)}</h3>
                <p class="text-gray-500 text-sm flex items-center gap-1">
                    <img src="https://flagcdn.com/w20/${business.country?.code?.toLowerCase()}.png" class="w-4 h-3 inline" onerror="this.style.display='none'">
                    ${business.country?.name}${business.city ? ', ' + business.city : ''}
                </p>
                <p class="text-gray-600 text-sm line-clamp-2 mt-2">${escapeHtml(business.cuisine_type || business.description?.substring(0, 100) || 'Açıklama yok')}...</p>
                <div class="flex justify-between items-center mt-3 pt-3 border-t">
                    <span class="text-gray-500 text-sm">${business.price_range || 'Fiyat sorunuz'}</span>
                    <button onclick="showBusinessDetail(${business.id})" class="text-blue-600 text-sm border border-blue-600 rounded-lg px-3 py-1 hover:bg-blue-50 transition">Detay</button>
                </div>
            </div>
        </div>
    `).join('');
}

window.viewApplicationDetail = async (appId) => {
  try {
    // Önce başvuruyu temel bilgilerle al
    const { data: app, error: appError } = await supabaseClient
      .from('applications')
      .select(`
        *,
        service:service_id (*),
        user:user_id (id, full_name, phone),
        representative:representative_id (id, full_name, phone),
        branch:branch_id (id, name)
      `)
      .eq('id', appId)
      .single();
    
    if (appError) {
      console.error('Başvuru detay hatası:', appError);
      showMessage('Başvuru detayları yüklenemedi: ' + appError.message, 'error');
      return;
    }
    
    if (!app) {
      showMessage('Başvuru bulunamadı', 'error');
      return;
    }
    
    // Belgeleri al
    const { data: docs } = await supabaseClient
      .from('application_documents')
      .select('*, document:document_id (id, name, description)')
      .eq('application_id', appId);
    
    // Mesajları al
    const { data: messages } = await supabaseClient
      .from('messages')
      .select('*, sender:profiles!sender_id (id, full_name, role)')
      .eq('application_id', appId)
      .order('created_at', { ascending: true });

            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
          </div>
          
          <div class="mb-4">
            <h3 class="font-semibold border-b pb-2 mb-2">👤 Müşteri Bilgileri</h3>
            <p><strong>Ad Soyad:</strong> ${escapeHtml(app.user?.full_name) || '-'}</p>
            <p><strong>Telefon:</strong> ${escapeHtml(app.user?.phone) || '-'}</p>

          <div class="mb-4">
            <h3 class="font-semibold border-b pb-2 mb-2">📋 Başvuru Bilgileri</h3>

            <p><strong>Hizmet Açıklaması:</strong> ${escapeHtml(app.service?.description) || '-'}</p>
            <p><strong>Tutar:</strong> ${formatCurrency(app.total_price_eur)}</p>
            <p><strong>Komisyon:</strong> ${formatCurrency(app.commission_amount_eur || app.commission_eur)}</p>
            <p><strong>Durum:</strong> <span class="status-badge status-${app.status}">${getStatusText(app.status)}</span></p>
            <p><strong>Başvuru Tarihi:</strong> ${formatDate(app.created_at)}</p>
            <p><strong>Son Güncelleme:</strong> ${formatDate(app.updated_at)}</p>
          </div>
          
          <div class="mb-4">
            <h3 class="font-semibold border-b pb-2 mb-2">🏢 Atama Bilgileri</h3>
            <p><strong>Şube:</strong> ${escapeHtml(app.branch?.name) || 'Atanmamış'}</p>
            <p><strong>Temsilci:</strong> ${escapeHtml(app.representative?.full_name) || 'Atanmamış'}</p>
          </div>
          
          <!-- DÜZELTİLMİŞ BELGE LİSTESİ -->
          <div class="mb-4">
            <h3 class="font-semibold border-b pb-2 mb-2">📎 Yüklenen Belgeler</h3>
            ${docs && docs.length > 0 ? docs.map(d => {
              // file_url kontrolü
              const fileUrl = d.file_url || '';
              const fileName = d.file_name || '';
              const docName = d.document?.name || 'Belge';
              const hasValidUrl = fileUrl && fileUrl !== 'undefined' && fileUrl !== 'null' && fileUrl !== '';
              
              return `

                  <div class="flex-1">

                    ${hasValidUrl ? 
                      `<button onclick="viewDocument('${fileUrl}', '${docName}', '${d.file_type || ''}')"

                          👁️ Görüntüle

                      `<span class="text-gray-400 text-sm px-2 py-1">❌ Dosya yok</span>`

          ` : ''}
          
          ${currentRole === 'admin' && app.status === 'approved' && app.payment_status === 'completed' ? `
            <div class="mt-4">
              <button onclick="completeApplication(${app.id})" class="btn-success w-full">✅ Başvuruyu Tamamla</button>

              <button onclick="cancelApplicationAdmin(${app.id})" class="btn-danger flex-1">❌ Başvuruyu İptal Et</button>
            </div>
          ` : ''}
          
          <div class="mt-4 pt-2 border-t">
            <button onclick="closeModal()" class="btn-secondary w-full">Kapat</button>
          </div>
        </div>
      </div>
    `;
    
    const existingModal = document.getElementById('detailModal');
    if (existingModal) existingModal.remove();
    document.body.insertAdjacentHTML('beforeend', modalHtml);

  } catch (err) {
    console.error('Detail view error:', err);
    showMessage('Başvuru detayları yüklenirken bir hata oluştu: ' + err.message, 'error');
  }
};

        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">Temsilci Değiştir</h2>

        </div>
        <form id="reassignAppForm" class="space-y-3">

          <div>
            <label class="block text-gray-700 font-medium mb-1">Başvuru</label>
            <input type="text" value="Başvuru #${appId} - ${app.services?.name || 'Hizmet'}" class="w-full p-2 border rounded-lg bg-gray-100" readonly>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-1">Mevcut Temsilci</label>
            <input type="text" value="${currentRep?.full_name || 'Atanmamış'}" class="w-full p-2 border rounded-lg bg-gray-100" readonly>

          <div>
            <label class="block text-gray-700 font-medium mb-1">Yeni Temsilci Seç</label>

              ${reps.map(r => `<option value="${r.id}" ${currentApp?.representative_id === r.id ? 'selected' : ''}>${r.full_name} - ${r.phone || 'Telefon yok'}</option>`).join('')}

            <button type="button" onclick="closeReassignAppModal()" class="btn-secondary flex-1">İptal</button>
          </div>
        </form>
      </div>
    </div>
  `;
  
  // Modalı göster
  const existingModal = document.getElementById('reassignAppModal');
  if (existingModal) existingModal.remove();
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  
  // Form submit handler
  document.getElementById('reassignAppForm').addEventListener('submit', async (e) => {
    e.preventDefault();

window.confirmPayment = async (appId) => {
  if (confirm('Bu başvurunun ödemesini onaylıyor musunuz?')) {
    const transactionId = 'PAY-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8).toUpperCase();
    
    const { error: paymentError } = await supabaseClient
      .from('payments')
      .update({ 
        status: 'completed', 
        paid_at: new Date(),
        transaction_id: transactionId
      })
      .eq('application_id', appId);
    
    if (paymentError) {
      showMessage('Ödeme onaylanamadı: ' + paymentError.message, 'error');
      return;
    }
    
    const { data: app, error: appError } = await supabaseClient
      .from('applications')
      .select('commission_amount_eur, branch_id, representative_id, total_price_eur')
      .eq('id', appId)
      .single();
    
    if (appError) {
      showMessage('Başvuru bilgileri alınamadı', 'error');
      return;
    }
    
    const { error: updateError } = await supabaseClient
      .from('applications')
      .update({ 
        payment_status: 'completed', 
        paid_at: new Date(),
        status: 'documents_uploaded',
        updated_at: new Date()
      })
      .eq('id', appId);
    
    if (updateError) {
      showMessage('Başvuru güncellenemedi: ' + updateError.message, 'error');
      return;
    }
    
    if (app.representative_id) {
      const { data: existingEarning } = await supabaseClient
        .from('earnings')
        .select('id')
        .eq('application_id', appId)
        .single();
      
      if (!existingEarning) {
        await supabaseClient.from('earnings').insert({
          branch_id: app.branch_id,
          application_id: appId,
          representative_id: app.representative_id,
          amount_eur: app.commission_amount_eur,
          paid_amount_eur: 0,
          remaining_amount_eur: app.commission_amount_eur,
          status: 'pending'
        });
      }
    }
    
    showMessage('Ödeme onaylandı ve hakediş oluşturuldu', 'success');
    closeModal();
    loadPage(currentPage);
  }
};

window.verifyDocument = async (appDocId, applicationId) => {
  if (!confirm('Bu belgeyi onaylamak istediğinizden emin misiniz?')) return;
  
  try {
    const { error } = await supabaseClient
      .from('application_documents')
      .update({ 
        verified: true, 
        verified_at: new Date().toISOString(), 
        verified_by: currentUser.id 
      })
      .eq('id', appDocId);
    
    if (error) throw error;
    
    showMessage('Belge onaylandı ✓', 'success');
    
    // Tüm belgeler onaylandı mı kontrol et
    const { data: allDocs } = await supabaseClient
      .from('application_documents')
      .select('verified')
      .eq('application_id', applicationId);
    
    const allVerified = allDocs?.every(doc => doc.verified === true);
    
    if (allVerified && allDocs?.length > 0) {
      // Tüm belgeler onaylandıysa başvuru durumunu güncelle
      await supabaseClient
        .from('applications')
        .update({ 
          status: 'under_review',
          updated_at: new Date().toISOString()
        })
        .eq('id', applicationId);
      
      showMessage('Tüm belgeler onaylandı! Başvuru incelemeye alındı.', 'success');
    }
    
    window.viewApplicationDetail(applicationId);
    
  } catch (error) {
    console.error('Belge onaylama hatası:', error);
    showMessage('Belge onaylanamadı: ' + error.message, 'error');
  }
};

// ========== 3. BAŞVURU BELGESİNİ SİL (Storage + Database) ==========
window.deleteApplicationDocument = async (appDocId, filePath, applicationId) => {
  if (!confirm('Bu belgeyi kalıcı olarak silmek istediğinizden emin misiniz?')) return;
  
  try {
    showMessage('Belge siliniyor...', 'info');
    
    // Storage'dan sil
    if (filePath) {
      const { error: storageError } = await supabaseClient.storage
        .from('application-documents')
        .remove([filePath]);
      
      if (storageError) {
        console.error('Storage silme hatası:', storageError);
      }
    }
    
    // Database'den sil
    const { error: dbError } = await supabaseClient
      .from('application_documents')
      .delete()
      .eq('id', appDocId);
    
    if (dbError) throw dbError;
    
    showMessage('Belge başarıyla silindi', 'success');
    
    // Sayfayı yenile
    if (applicationId) {
      window.viewApplicationDetail(applicationId);
    } else {
      loadPage(currentPage);
    }
    
  } catch (error) {
    console.error('Belge silme hatası:', error);
    showMessage('Belge silinemedi: ' + error.message, 'error');
  }
};

// ========== 7. YARDIMCI FONKSİYONLAR ==========
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  return new Date(dateStr).toLocaleDateString('tr-TR');
}

  if (!docs || docs.length === 0) {

  }
  
  return docs.map(doc => `
    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg mb-2 hover:shadow-md transition">
      <div class="flex-1">
        <div class="flex items-center gap-2">
          ${doc.file_type?.includes('pdf') ? 
            '<i data-lucide="file-pdf" class="w-5 h-5 text-red-500"></i>' : 
            '<i data-lucide="file-image" class="w-5 h-5 text-blue-500"></i>'}
          <span class="font-medium">${escapeHtml(doc.document?.name || 'Belge')}</span>
          ${doc.verified ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">✓ Onaylı</span>' : 
                           '<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded">⏳ Bekliyor</span>'}
        </div>
        <p class="text-xs text-gray-500 mt-1">
          📅 Yüklenme: ${formatDate(doc.uploaded_at)} | 
          📦 Boyut: ${doc.file_size ? (doc.file_size / 1024).toFixed(2) + ' KB' : '-'}
        </p>
        ${doc.document?.description ? `<p class="text-xs text-gray-400 mt-1">📝 ${escapeHtml(doc.document.description)}</p>` : ''}
      </div>
      <div class="flex gap-2">
        <button onclick="viewDocument('${doc.file_url}', '${doc.file_name}', '${doc.file_type || ''}')" 
                class="text-blue-600 hover:text-blue-800 text-sm px-2 py-1 rounded hover:bg-blue-50">

        ${currentRole === 'representative' && !doc.verified ? `

                  class="text-green-600 hover:text-green-800 text-sm px-2 py-1 rounded hover:bg-green-50">

/**
 * PDFLib kütüphanesini yükle
 */
async function loadPDFLib() {
    return new Promise((resolve, reject) => {
        if (typeof PDFLib !== 'undefined') {
            console.log('✅ PDFLib zaten yüklü');
            resolve();
            return;
        }
        
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';
        script.onload = () => {
            console.log('✅ PDFLib yüklendi');
            resolve();
        };
        script.onerror = () => reject(new Error('PDFLib yüklenemedi'));
        document.head.appendChild(script);
    });
}

/**
 * Resmi JPG'ye dönüştür (kalite korumalı)
 */
async function convertToJPG(file, quality = 0.9) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            canvas.toBlob((blob) => {
                URL.revokeObjectURL(url);
                const jpgFile = new File([blob], file.name.replace(/\.(png|jpg|jpeg|bmp|gif)$/i, '.jpg'), {
                    type: 'image/jpeg',
                    lastModified: Date.now()
                });
                resolve(jpgFile);
            }, 'image/jpeg', quality);
        };
        
        img.onerror = reject;
        img.src = url;
    });
}

/**
 * Tüm dosyaları tek PDF'te birleştir
 */
async function convertAllToSinglePDF(files, applicationId) {
    try {
        await loadPDFLib();
        
        const pdfDoc = await PDFLib.PDFDocument.create();
        let pageCount = 0;
        const convertedFiles = [];
        
        for (const file of files) {
            const fileExt = file.name.split('.').pop().toLowerCase();
            let processedFile = file;
            
            // PNG/Resimleri JPG'ye dönüştür
            if (fileExt === 'png' || fileExt === 'bmp' || fileExt === 'gif') {
                processedFile = await convertToJPG(file, 0.9);
                console.log(`🔄 ${file.name} → JPG dönüştürüldü`);
                convertedFiles.push({ original: file.name, converted: processedFile.name, type: 'image' });
            } else if (fileExt === 'jpg' || fileExt === 'jpeg') {
                console.log(`📸 ${file.name} JPG olarak işleniyor`);
                convertedFiles.push({ original: file.name, converted: file.name, type: 'image' });
            } else if (fileExt === 'pdf') {
                console.log(`📄 ${file.name} PDF olarak işleniyor`);
                convertedFiles.push({ original: file.name, converted: file.name, type: 'pdf' });
            }
            
            // PDF'e ekle
            try {
                if (processedFile.type === 'application/pdf') {
                    // PDF ise sayfaları içe aktar
                    const existingPdf = await PDFLib.PDFDocument.load(await processedFile.arrayBuffer());
                    const pages = await pdfDoc.copyPages(existingPdf, existingPdf.getPageIndices());
                    pages.forEach(page => {
                        pdfDoc.addPage(page);
                        pageCount++;
                    });
                } else {
                    // Resim ise JPG olarak göm
                    const imageBytes = await processedFile.arrayBuffer();
                    const jpgImage = await pdfDoc.embedJpg(imageBytes);
                    const page = pdfDoc.addPage([jpgImage.width, jpgImage.height]);
                    page.drawImage(jpgImage);
                    pageCount++;
                }
            } catch (err) {
                console.error(`❌ ${file.name} eklenemedi:`, err);
            }
        }
        
        if (pageCount === 0) {
            throw new Error('Hiçbir dosya PDF\'e dönüştürülemedi');
        }
        
        const pdfBytes = await pdfDoc.save();
        const pdfFileName = `application_${applicationId}_${Date.now()}.pdf`;
        const pdfFile = new File([pdfBytes], pdfFileName, {
            type: 'application/pdf',
            lastModified: Date.now()
        });
        
        const totalOriginalSize = files.reduce((sum, f) => sum + f.size, 0);
        const savedSpace = ((totalOriginalSize - pdfBytes.length) / 1024 / 1024).toFixed(2);
        
        console.log(`✅ PDF oluşturuldu: ${pageCount} sayfa, ${(pdfBytes.length / 1024).toFixed(2)} KB`);
        console.log(`💾 Tasarruf: ${savedSpace} MB (${((1 - pdfBytes.length / totalOriginalSize) * 100).toFixed(1)}%)`);
        
        return { pdfFile, pageCount, savedSpace, convertedFiles };
        
    } catch (error) {
        console.error('PDF dönüşüm hatası:', error);
        throw error;
    }
}

/**
 * PDF'i Supabase Storage'a yükle
 */
async function uploadPDFToSupabase(pdfFile, applicationId, metadata) {
    try {
        const timestamp = Date.now();
        const fileName = `application_${applicationId}_${timestamp}.pdf`;
        const filePath = `${applicationId}/${fileName}`;
        
        console.log(`📤 PDF yükleniyor: ${fileName} (${(pdfFile.size / 1024).toFixed(2)} KB)`);
        
        const { data, error } = await supabaseClient.storage
            .from('application-documents')
            .upload(filePath, pdfFile, {
                cacheControl: '3600',
                upsert: false,
                contentType: 'application/pdf'
            });
        
        if (error) throw error;
        
        const { data: { publicUrl } } = supabaseClient.storage
            .from('application-documents')
            .getPublicUrl(filePath);
        
        // Tek bir kayıt olarak veritabanına ekle
        const { error: insertError } = await supabaseClient
            .from('application_documents')
            .insert({
                application_id: applicationId,
                document_id: null,
                file_id: data.path,
                file_url: publicUrl,
                file_name: fileName,
                file_size: pdfFile.size,
                file_type: 'application/pdf',
                uploaded_at: new Date().toISOString(),
                verified: false,
                metadata: metadata
            });
        
        if (insertError) throw insertError;
        
        console.log(`✅ PDF başarıyla yüklendi`);
        return { success: true, fileUrl: publicUrl, filePath: data.path };
        
    } catch (error) {
        console.error('❌ PDF yükleme hatası:', error);
        return { success: false, error: error.message };
    }
}

// AI Skor hesaplama
async function calculateUnifiedAIScore(type, data) {
    let score = 70;
    let recommendation = '';
    
    if (type === 'consultancy') {
        // Danışmanlık için AI skor (basit)
        if (data.passport_number?.match(/^[A-Z]{2}\d{8}$/)) score += 10;
        recommendation = 'Danışmanlık başvurunuz değerlendiriliyor.';
        
    } else if (type === 'visa') {
        // Vize için AI skor
        if (data.passport_number?.match(/^[A-Z]{2}\d{8}$/)) score += 10;
        if (data.has_previous_travel) score += 15;
        if (data.monthly_income >= 2000) score += 10;
        else if (data.monthly_income >= 1000) score += 5;
        
        if (score < 50) recommendation = 'Uygunluk skorunuz düşük. Ek belgeler hazırlamanız önerilir.';
        else if (score < 70) recommendation = 'Uygunluk skorunuz orta. Belgelerinizi eksiksiz gönderin.';
        else recommendation = 'Uygunluk skorunuz yüksek. Başvurunuz için uygun görünüyorsunuz.';
        
    } else if (type === 'immigration') {
        // Göç için AI skor
        if (data.education_level === 'Yüksek Lisans' || data.education_level === 'Doktora') score += 15;
        if (data.work_experience_years >= 5) score += 10;
        if (data.has_job_offer) score += 15;
        if (data.language_level === 'B2' || data.language_level === 'C1' || data.language_level === 'C2') score += 10;
        if (data.monthly_income >= 3000) score += 10;
        
        if (score < 50) recommendation = 'Göç başvurunuz için dil seviyenizi yükseltmeniz ve iş teklifi almanız önerilir.';
        else if (score < 70) recommendation = 'Göç başvurunuz için ek belgelerle başvurunuzu güçlendirebilirsiniz.';
        else recommendation = 'Göç başvurunuz için uygun görünüyorsunuz.';
    }
    
    const finalScore = Math.min(100, Math.max(0, score));
    const riskLevel = finalScore >= 75 ? 'Low' : (finalScore >= 50 ? 'Medium' : 'High');
    
    return { score: finalScore, riskLevel, recommendation };
}
