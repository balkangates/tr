async function checkAuth() {
    try {
        const { data: { user }, error } = await supabaseClient.auth.getUser();
        if (error || !user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        
        const { data: profile, error: profileError } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', user.id)
            .single();
        
        if (profileError && profileError.code === 'PGRST116') {
            const { data: newProfile, error: insertError } = await supabaseClient
                .from('profiles')
                .insert({ id: user.id, full_name: user.email?.split('@')[0], role: 'customer' })
                .select()
                .single();
            
            if (!insertError) {
                currentProfile = newProfile;
                currentRole = newProfile?.role || 'customer';
            } else {
                currentProfile = { id: user.id, full_name: user.email?.split('@')[0], role: 'customer' };
                currentRole = 'customer';
            }
        } else {
            currentProfile = profile;
            currentRole = profile?.role || 'customer';
        }

        document.getElementById('userName').innerHTML = currentProfile?.full_name || user.email?.split('@')[0] || 'Kullanıcı';
        document.getElementById('userEmail').innerHTML = user.email || '';
        
        // Dashboard'u başlat (burada renderPage çağrılmamalı, initDashboard çağrılmalı)
        initDashboard();
        
    } catch (err) {
        console.error('Auth error:', err);
        window.location.href = 'index.html';
    }
}

// ========== RENDER SIDEBAR (AKORDİYONLU) ==========
function renderSidebar() {
  const menu = getMenuItems();
  const nav = document.getElementById('sidebar-nav');
  
  let html = '';
  
  // Main menü öğeleri
  if (menu.main && menu.main.length > 0) {
    html += `<div class="space-y-1 mb-4">`;
    menu.main.forEach(item => {
      html += `
        <div class="sidebar-item p-2 rounded flex items-center gap-3" data-page="${item.id}">
          <i data-lucide="${item.icon}" class="w-5 h-5"></i>
          <span>${item.label}</span>
        </div>
      `;
    });
    html += `</div>`;
  }
  
  // Gruplandırılmış menüler (Akordiyon)
  if (menu.groups && menu.groups.length > 0) {
    menu.groups.forEach((group, index) => {
      const groupId = `accordion-${index}`;
      html += `
        <div class="accordion-group mb-2">
          <div class="accordion-header p-2 rounded flex items-center gap-3 cursor-pointer hover:bg-gray-100 transition" data-accordion="${groupId}">
            <i data-lucide="${group.icon}" class="w-5 h-5 text-gray-500"></i>
            <span class="font-medium text-gray-700 flex-1">${group.name}</span>
            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 transition-transform accordion-icon-${groupId}"></i>
          </div>
          <div id="${groupId}" class="accordion-content ml-6 space-y-1 mt-1 hidden">
      `;
      
      group.items.forEach(item => {
        html += `
          <div class="sidebar-item p-2 rounded flex items-center gap-3 pl-6" data-page="${item.id}">
            <i data-lucide="${item.icon}" class="w-4 h-4"></i>
            <span class="text-sm">${item.label}</span>
          </div>
        `;
      });
      
      html += `
          </div>
        </div>
      `;
    });
  }
  
  nav.innerHTML = html;
  lucide.createIcons();
  
  // Akordiyon event listener'ları
  document.querySelectorAll('.accordion-header').forEach(header => {
    header.addEventListener('click', () => {
      const accordionId = header.dataset.accordion;
      const content = document.getElementById(accordionId);
      const icon = document.querySelector(`.accordion-icon-${accordionId}`);
      
      if (content && content.classList.contains('hidden')) {
        document.querySelectorAll('.accordion-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('[class^="accordion-icon-"]').forEach(ic => {
          if (ic) ic.style.transform = 'rotate(0deg)';
        });
        content.classList.remove('hidden');
        if (icon) icon.style.transform = 'rotate(180deg)';
      } else if (content) {
        content.classList.add('hidden');
        if (icon) icon.style.transform = 'rotate(0deg)';
      }
    });
  });
  
  // Sidebar item tıklama
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      loadPage(el.dataset.page);
    });
  });
  
  // Sayfa yüklendiğinde aktif menüyü göster
  const activeItem = document.querySelector(`.sidebar-item[data-page="${currentPage}"]`);
  if (activeItem) {
    activeItem.classList.add('active');
    const parentContent = activeItem.closest('.accordion-content');
    if (parentContent) {
      parentContent.classList.remove('hidden');
      const accordionId = parentContent.id;
      const icon = document.querySelector(`.accordion-icon-${accordionId}`);
      if (icon) icon.style.transform = 'rotate(180deg)';
    }
  }
}

async function loadPage(pageId) {
  currentPage = pageId;
  const container = document.getElementById('dashboard-content');
  container.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loading-spinner"></div></div>';
  
  const pageFunctions = {
    // ANA SAYFALAR
    'dashboard': () => renderDashboard(),
    'messages': () => renderMessages(),
    'profile': () => renderProfile(),
    'settings': () => renderSettings(),
    
    // DANIŞMANLIK
    'my-applications': () => renderMyApplications(),
    'new-application': () => renderNewApplication(),
    'assigned-applications': () => renderAssignedApplications(),
    'applications': () => renderAllApplications(),
    
    // VİZE BAŞVURULARI
    'visa-applications': () => renderVisaApplications(),
    'new-visa-application': () => renderNewVisaApplication(),
    'visa-statistics': () => renderVisaStatistics(),
    'visa-settings': () => renderVisaSettings(),
    
    // GÖÇ BAŞVURULARI
    'immigration-applications': () => renderImmigrationApplications(),
    'new-immigration-application': () => renderNewApplication('immigration'),
    'immigration-statistics': () => renderImmigrationStatistics(),
    'immigration-settings': () => renderImmigrationSettings(),
    
    // YÖNETİM
    'users': () => renderUsers(),
    'branches': () => renderBranches(),
    'banks': () => renderBanks(),
    'services': () => renderServices(),
    'countries': () => renderCountries(),
    'documents': () => renderDocuments(),
    
    // FİNANS
    'earnings': () => renderEarnings(),
    'commission-payments': () => renderCommissionPayments(),
    
    // İLANLAR
    'job-management': () => renderJobManagement(),
    'accommodation-management': () => renderAccommodationManagement(),
    'business-management': () => renderBusinessManagement(),
    'job-listings': () => renderJobListingsForCustomer(),
    'accommodation-listings': () => renderAccommodationListingsForCustomer(),
    'business-listings': () => renderBusinessListingsForCustomer()
  };
  
  if (pageFunctions[pageId]) {
    container.innerHTML = await pageFunctions[pageId]();
  } else {
    container.innerHTML = '<div class="card text-center">Sayfa bulunamadı.</div>';
  }
  lucide.createIcons();
}
  

// ========== ROLE BAZLI DASHBOARD - DÜZELTİLMİŞ (profiles.email hatası giderildi) ==========
async function renderDashboard() {
    try {
        let allApps = [];
        let query = supabaseClient
            .from('applications')
            .select(`
                *,
                services:service_id (
                    id,
                    name,
                    service_type
                ),
                customer:user_id (
                    id,
                    full_name,
                    phone
                ),
                representative:representative_id (
                    id,
                    full_name
                )
            `)
            .order('created_at', { ascending: false });
        
        // ========== ROLE GÖRE FİLTRELEME ==========
        if (currentRole === 'customer') {
            query = query.eq('user_id', currentUser.id);
            console.log('📋 Müşteri dashboard - Kendi başvuruları gösteriliyor');
        } 
        else if (currentRole === 'representative') {
            query = query.eq('representative_id', currentUser.id);
            console.log('📋 Temsilci dashboard - Atanan başvurular gösteriliyor');
        }
        else if (currentRole === 'admin') {
            console.log('📋 Admin dashboard - Tüm başvurular gösteriliyor');
        }
        
        const { data: apps, error } = await query;
        
        if (error) {
            console.error('Veri çekme hatası:', error);
            return `<div class="card text-center text-red-600 p-6">
                        <p>⚠️ Veri yüklenirken hata: ${error.message}</p>
                        <button onclick="location.reload()" class="btn-primary mt-3">Tekrar Dene</button>
                    </div>`;
        }
        
        allApps = apps || [];
        console.log(`${currentRole} için ${allApps.length} başvuru bulundu`);
        
        // ========== BAŞVURULARI TİPLERİNE GÖRE AYIR ==========
        const visaApps = [];
        const immigrationApps = [];
        
        for (const app of allApps) {
            const serviceType = app.services?.service_type;
            if (serviceType === 'visa') {
                visaApps.push(app);
            } else if (serviceType === 'immigration') {
                immigrationApps.push(app);
            }
        }
        
        // ========== Vize İstatistikleri ==========
        let visaTotal = visaApps.length;
        let visaPending = 0;
        let visaApproved = 0;
        let visaRejected = 0;
        let visaCompleted = 0;
        let visaTotalAmount = 0;
        
        for (const app of visaApps) {
            visaTotalAmount += (app.total_price_eur || 0);

// ========== YENİ EKLE - STEP NAVIGASYON FONKSİYONLARI ==========
function nextAppStep() {
    // Step 1'den Step 2'ye geçerken kontrol
    if (currentAppStep === 1) {
        const countryId = document.getElementById('countrySelect')?.value;
        const serviceId = document.getElementById('serviceSelect')?.value;
        if (!countryId) {
            showMessage('Lütfen hedef ülke seçin', 'error');
            return;
        }
        if (!serviceId) {
            showMessage('Lütfen hizmet seçin', 'error');
            return;
        }
    }
    
    if (currentAppStep < totalAppSteps) {
        document.getElementById(`appStep${currentAppStep}`).classList.add('hidden');
        currentAppStep++;
        document.getElementById(`appStep${currentAppStep}`).classList.remove('hidden');
        updateAppStepIndicator();
        
        // Step 3'e geçerken belgeleri yükle
        if (currentAppStep === 3) {
            loadStepDocuments();
        }
        // Step 4'e geçerken fiyatı güncelle
        if (currentAppStep === 4) {
            updateStepPrice();
        }
    }
}

// YENİ EKLE - Geri adım
function prevAppStep() {
    if (currentAppStep > 1) {
        document.getElementById(`appStep${currentAppStep}`).classList.add('hidden');
        currentAppStep--;
        document.getElementById(`appStep${currentAppStep}`).classList.remove('hidden');
        updateAppStepIndicator();
    }
}

// YENİ EKLE - Step indicator güncelleme
function updateAppStepIndicator() {
    const steps = document.querySelectorAll('.flex.mb-6.border-b > div');
    steps.forEach((step, index) => {
        if (index + 1 === currentAppStep) {
            step.classList.add('text-[#D4A017]', 'font-bold');
            step.classList.remove('text-gray-500');
        } else {
            step.classList.remove('text-[#D4A017]', 'font-bold');
            step.classList.add('text-gray-500');
        }
    });
}

// YENİ EKLE - Step 3 için belge yükleme
async function loadStepDocuments() {
    const serviceId = document.getElementById('serviceSelect')?.value;
    if (!serviceId) return;
    
    const { data: docs } = await supabaseClient
        .from('documents')
        .select('*')
        .eq('service_id', parseInt(serviceId));
    
    const container = document.getElementById('documentsList');
    if (!container) return;
    
    if (docs && docs.length > 0) {
        container.innerHTML = docs.map(doc => `
            <div class="border rounded-lg p-3 ${doc.is_required ? 'border-l-4 border-l-red-500' : ''}">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <label class="font-medium ${doc.is_required ? 'text-red-600' : ''}">
                            ${escapeHtml(doc.name)} ${doc.is_required ? '*' : ''}
                        </label>
                        <p class="text-xs text-gray-500">${escapeHtml(doc.description) || 'Açıklama yok'}</p>
                    </div>
                    <div class="flex gap-2">
                        <input type="file" data-doc-id="${doc.id}" data-doc-name="${doc.name}" 
                               class="docFile text-sm" accept=".pdf,.jpg,.png" style="display: none;">
                        <button type="button" onclick="this.previousElementSibling.click()" 
                                class="text-blue-600 text-sm border border-blue-600 rounded px-3 py-1 hover:bg-blue-50">
                            📎 Yükle
                        </button>
                        <span id="status_${doc.id}" class="text-xs px-2 py-1 rounded status-missing">Yüklenmedi</span>
                    </div>
                </div>
                <div id="fileInfo_${doc.id}" class="text-xs text-gray-400 mt-1"></div>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<p class="text-gray-500 text-center py-4">Bu hizmet için belge gereksinimi bulunmuyor.</p>';
    }
}

// YENİ EKLE - Step 4 için fiyat güncelleme
function updateStepPrice() {
    const serviceSelect = document.getElementById('serviceSelect');
    const selectedOption = serviceSelect?.options[serviceSelect.selectedIndex];
    const price = parseFloat(selectedOption?.dataset?.price) || 0;
    const commission = parseFloat(selectedOption?.dataset?.commission) || 0;
    
    const priceSpan = document.getElementById('stepServicePrice');
    const commissionSpan = document.getElementById('stepCommissionAmount');
    const totalSpan = document.getElementById('totalPrice');
    
    if (priceSpan) priceSpan.innerHTML = `€${price.toFixed(2)}`;
    if (commissionSpan) commissionSpan.innerHTML = `€${commission.toFixed(2)}`;
    if (totalSpan) totalSpan.innerHTML = `€${(price + commission).toFixed(2)}`;
}

// YENİ EKLE - Ülke bilgi güncelleme
function updateStepCountryInfo() {
    const select = document.getElementById('countrySelect');
    const selectedOption = select?.options[select.selectedIndex];
    const countryName = selectedOption?.text;
    const infoDiv = document.getElementById('stepCountryInfo');
    
    if (countryName && infoDiv) {
        infoDiv.classList.remove('hidden');
        infoDiv.innerHTML = `📍 ${countryName} için hizmetler listelenmiştir. Lütfen hizmet seçiniz.`;
    } else if (infoDiv) {
        infoDiv.classList.add('hidden');
    }
}

window.exportImmigrationStatistics = async () => {
    try {
        const { data: immigrationServices } = await supabaseClient
            .from('services')
            .select('id')
            .eq('service_type', 'immigration');
        
        const ids = immigrationServices?.map(s => s.id) || [];
        
        const { data: apps } = await supabaseClient
            .from('applications')
            .select(`*, services:service_id(name), customer:user_id(full_name, phone)`)
            .in('service_id', ids);
        
        const headers = ['Başvuru No', 'Müşteri Adı', 'Telefon', 'Hizmet', 'Tutar (€)', 'Durum', 'Başvuru Tarihi'];
        const rows = apps?.map(app => [app.id, app.customer?.full_name || '-', app.customer?.phone || '-', app.services?.name || '-', app.total_price_eur, getStatusText(app.status), formatDate(app.created_at)]) || [];
        
        const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `goc_istatistikleri_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showMessage('✅ İstatistikler dışa aktarıldı', 'success');
    } catch (error) {
        showMessage('Dışa aktarma hatası: ' + error.message, 'error');
    }
};

window.toggleImmigrationCountryActive = async (countryId, isActive) => {
    try {
        await supabaseClient.from('countries').update({ immigration_active: isActive }).eq('id', countryId);
        showMessage(`Göç başvuruları ${isActive ? 'aktifleştirildi' : 'pasifleştirildi'}`, 'success');
    } catch (error) { showMessage('Güncellenemedi', 'error'); location.reload(); }
};

window.updateImmigrationSetting = async (countryId, field, value) => {
    try {
        const updateData = {};
        if (field === 'immigration_processing_days') updateData.immigration_processing_days = parseInt(value);
        else if (field === 'immigration_fee_eur') updateData.immigration_fee_eur = parseFloat(value);
        else if (field === 'immigration_success_rate') updateData.immigration_success_rate = parseFloat(value);
        await supabaseClient.from('countries').update(updateData).eq('id', countryId);
        showMessage('Ayar güncellendi', 'success');
    } catch (error) { showMessage('Güncellenemedi', 'error'); }
};

window.saveImmigrationRequirements = async (countryId) => {
    const { data: country } = await supabaseClient.from('countries').select('name, immigration_requirements').eq('id', countryId).single();
    document.getElementById('immReqCountryId').value = countryId;
    document.getElementById('immReqCountryName').value = country?.name || '';
    document.getElementById('immigrationRequirementsText').value = country?.immigration_requirements || '';
    document.getElementById('immigrationRequirementsModal').classList.add('active');
};

window.closeImmigrationRequirementsModal = () => {
    document.getElementById('immigrationRequirementsModal').classList.remove('active');
};

document.addEventListener('submit', async (e) => {
    if (e.target.id === 'immigrationRequirementsForm') {
        e.preventDefault();
        const countryId = document.getElementById('immReqCountryId').value;
        const requirements = document.getElementById('immigrationRequirementsText').value;
        const { error } = await supabaseClient.from('countries').update({ immigration_requirements: requirements }).eq('id', parseInt(countryId));
        if (error) showMessage('Kaydedilemedi: ' + error.message, 'error');
        else { showMessage('✅ Göç gereksinimleri kaydedildi', 'success'); closeImmigrationRequirementsModal(); }
    }
});

let currentEditId = null;
let messageTimeout = null;

// ========== SHOW MESSAGE (DÜZELTİLMİŞ) ==========
function showMessage(text, type = 'success') {
  const msgDiv = document.getElementById('globalMessage');
  if (!msgDiv) {
    console.log(`${type.toUpperCase()}: ${text}`);
    alert(text);
    return;
  }
  
  if (messageTimeout) clearTimeout(messageTimeout);
  
  msgDiv.className = `message ${type}`;
  msgDiv.innerHTML = text;
  msgDiv.style.display = 'block';
  
  messageTimeout = setTimeout(() => {
    if (msgDiv) msgDiv.style.display = 'none';
  }, 4000);
}

async function saveCountry(formData) {
  const countryId = document.getElementById('countryId').value;
  console.log('Kaydediliyor...', { countryId, formData });
  
  let result;
  if (countryId) {
    result = await supabaseClient
      .from('countries')
      .update(formData)
      .eq('id', parseInt(countryId));
  } else {
    result = await supabaseClient
      .from('countries')
      .insert([formData]);
  }
  
  if (result.error) {
    console.error('Supabase hatası:', result.error);
    throw result.error;
  }
  
  console.log('Kayıt başarılı!');
  return result;
}

// ========== ESCAPE HTML ==========
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ========== RENDER PAGE - DÜZELTİLMİŞ (SAYFA YÖNLENDİRMESİ İÇİN) ==========
async function renderPage() {
    const container = document.getElementById('dashboard-content');
    if (!container) return;
    
    // Hangi sayfanın gösterileceğini kontrol et
    const urlParams = new URLSearchParams(window.location.search);
    const pageParam = urlParams.get('page');
    
    // Sayfa yüklendiğinde gösterilecek içerik
    if (pageParam === 'new-application') {
        container.innerHTML = await renderNewApplication();
    } else if (pageParam === 'visa-applications') {
        container.innerHTML = await renderVisaApplications();
    } else if (pageParam === 'immigration-applications') {
        container.innerHTML = await renderImmigrationApplications();
    } else if (pageParam === 'my-applications') {
        container.innerHTML = await renderMyApplications();
    } else if (currentRole === 'admin' && pageParam === 'documents') {
        container.innerHTML = await renderDocuments();
    } else if (currentRole === 'admin' && pageParam === 'countries') {
        container.innerHTML = await renderCountries();
    } else {
        // Varsayılan olarak dashboard'u göster
        container.innerHTML = await renderDashboard();
    }
    
    // Lucide ikonlarını yenile
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
}

function attachFormSubmitEvent() {
  const form = document.getElementById('countryForm');
  if (form) {
    // Eski event listener'ı kaldır
    const newForm = form.cloneNode(true);
    form.parentNode.replaceChild(newForm, form);
    
    newForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        name: document.getElementById('name').value.trim(),
        code: document.getElementById('code').value.trim().toUpperCase(),
        currency: document.getElementById('currency').value || 'EUR',
        visa_active: document.getElementById('visa_active').checked,
        visa_processing_days: parseInt(document.getElementById('visa_processing_days').value) || 15,
        visa_success_rate: parseFloat(document.getElementById('visa_success_rate').value) || 75,
        visa_fee_eur: parseFloat(document.getElementById('visa_fee_eur').value) || 80,
        visa_requirements: document.getElementById('visa_requirements').value || null,
        immigration_active: document.getElementById('immigration_active').checked,
        immigration_processing_days: parseInt(document.getElementById('immigration_processing_days').value) || 30,
        immigration_success_rate: parseFloat(document.getElementById('immigration_success_rate').value) || 85,
        immigration_fee_eur: parseFloat(document.getElementById('immigration_fee_eur').value) || 1500,
        immigration_requirements: document.getElementById('immigration_requirements').value || null,
        embassy_address: document.getElementById('embassy_address').value || null,
        embassy_phone: document.getElementById('embassy_phone').value || null,
        embassy_email: document.getElementById('embassy_email').value || null,
        consulate_website: document.getElementById('consulate_website').value || null,
        visa_service_id: document.getElementById('visa_service_id').value ? parseInt(document.getElementById('visa_service_id').value) : null,
        immigration_service_id: document.getElementById('immigration_service_id').value ? parseInt(document.getElementById('immigration_service_id').value) : null,
        last_visa_update: new Date().toISOString()
      };
      
      if (!formData.name || !formData.code) {
        showMessage('Ülke adı ve kodu zorunludur!', 'error');
        return;
      }
      
      try {
        await saveCountry(formData);
        window.closeCountryModal();
        await renderPage();
        showMessage('✅ Kayıt başarıyla ' + (document.getElementById('countryId').value ? 'güncellendi' : 'eklendi'), 'success');
      } catch (error) {
        showMessage('❌ Kayıt hatası: ' + error.message, 'error');
      }
    });
  }
}

            const { data: profiles, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('phone', phone)
                .limit(1);
            
            if (!error && profiles && profiles.length > 0) {
                customer = profiles[0];
            }
        }
        
        // 2. Telefon ile bulunamadıysa email ile ara (profiles.email alanı varsa)
        if (!customer && email) {
            const { data: profiles, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('email', email)
                .limit(1);
            
            if (!error && profiles && profiles.length > 0) {
                customer = profiles[0];
            }
        }
        
        // 3. Kullanıcı bulunamadıysa
        if (!customer) {
            console.log('Müşteri bulunamadı');
            const noResultDiv = document.getElementById('customerSearchNoResult');
            const resultDiv = document.getElementById('customerSearchResult');
            if (noResultDiv) noResultDiv.classList.remove('hidden');
            if (resultDiv) resultDiv.classList.add('hidden');
            searchedCustomer = null;
            return;
        }
        
        console.log('Müşteri bulundu:', customer);
        
        // TC Kimlik veya Pasaport kontrolü (opsiyonel uyarı)
        if (identityNo && customer.identity_number && customer.identity_number !== identityNo) {
            showMessage('⚠️ Uyarı: Girilen TC Kimlik numarası kayıtlı müşteri ile eşleşmiyor.', 'info');
        }
        
        if (passportNo && customer.passport_number && customer.passport_number !== passportNo) {
            showMessage('⚠️ Uyarı: Girilen Pasaport numarası kayıtlı müşteri ile eşleşmiyor.', 'info');
        }
        
        searchedCustomer = customer;
        
        // Sonuçları göster
        const nameSpan = document.getElementById('searchResultName');
        const infoSpan = document.getElementById('searchResultInfo');
        const contactSpan = document.getElementById('searchResultContact');
        
        if (nameSpan) nameSpan.innerHTML = customer.full_name || 'İsimsiz Müşteri';
        if (infoSpan) infoSpan.innerHTML = `📞 ${customer.phone || '-'} | ✉️ ${customer.email || '-'}`;
        if (contactSpan) contactSpan.innerHTML = `🆔 TC: ${customer.identity_number || 'Kayıtlı değil'} | 📘 Pasaport: ${customer.passport_number || 'Kayıtlı değil'}`;
        
        const noResultDiv = document.getElementById('customerSearchNoResult');
        const resultDiv = document.getElementById('customerSearchResult');
        if (noResultDiv) noResultDiv.classList.add('hidden');
        if (resultDiv) resultDiv.classList.remove('hidden');
        
        showMessage('✅ Müşteri bulundu! "Bu Müşteriyi Kullan" butonuna tıklayın.', 'success');
        
    } catch (error) {
        console.error('Arama hatası:', error);
        showMessage('Arama sırasında hata oluştu: ' + error.message, 'error');
    }
};

// Vize hizmetlerini ülkeye göre getir
async function loadVisaServicesByCountry(countryId) {
    if (!countryId) return;
    
    const { data: services } = await supabaseClient
        .from('services')
        .select('id, name, price_eur, commission_amount_eur')
        .eq('country_id', parseInt(countryId))
        .eq('service_type', 'visa')
        .eq('is_active', true);
    
    const serviceSelect = document.getElementById('visaService');
    if (serviceSelect && services && services.length > 0) {
        serviceSelect.disabled = false;
        serviceSelect.innerHTML = '<option value="">-- Hizmet Seçiniz --</option>' + 
            services.map(s => `<option value="${s.id}" data-price="${s.price_eur}" data-commission="${s.commission_amount_eur}">${escapeHtml(s.name)} - ${formatCurrency(s.price_eur)}</option>`).join('');
    } else if (serviceSelect) {
        serviceSelect.disabled = false;
        serviceSelect.innerHTML = '<option value="">-- Hizmet bulunamadı --</option>';
    }
}
    
// Vize temsilcilerini ülkeye göre getir
async function loadVisaRepresentativesByCountry(countryId) {
    if (!countryId) return;
    
    const { data: branches } = await supabaseClient
        .from('branches')
        .select('id')
        .eq('country_id', parseInt(countryId));
    
    const repArea = document.getElementById('visaRepArea');
    const repSelect = document.getElementById('visaRepresentative');
    
    if (branches && branches.length > 0 && repSelect) {
        const branchIds = branches.map(b => b.id);
        const { data: reps } = await supabaseClient
            .from('representative_branches')
            .select('representative:representative_id(id, full_name, phone)')
            .in('branch_id', branchIds);
        
        if (reps && reps.length > 0 && repArea) {
            repArea.style.display = 'block';
            repSelect.innerHTML = '<option value="">-- Temsilci Seçin (Opsiyonel) --</option>' + 
                reps.map(r => `<option value="${r.representative.id}">${escapeHtml(r.representative.full_name)} ${r.representative.phone ? `(${r.representative.phone})` : ''}</option>`).join('');
            repSelect.disabled = false;
        } else if (repArea) {
            repArea.style.display = 'block';
            repSelect.innerHTML = '<option value="">-- Bu ülkede temsilci bulunamadı --</option>';
            repSelect.disabled = true;
        }
    } else if (repArea) {
        repArea.style.display = 'none';
    }
}

// ========== VİZE BELGELERİNİ YÜKLE (HEM ÜLKE HEM HİZMET BAZLI) ==========
async function loadVisaDocuments() {
    const countryId = document.getElementById('visaCountry')?.value;
    const serviceId = document.getElementById('visaService')?.value;
    const applicationType = 'visa';
    
    console.log('📄 Belgeler yükleniyor - Ülke ID:', countryId, 'Hizmet ID:', serviceId, 'Tip:', applicationType);
    
    const container = document.getElementById('visaDocsList');
    if (!container) return;
    
    if (!countryId) {
        container.innerHTML = '<p class="text-gray-500 text-center py-4">Lütfen önce ülke seçiniz.</p>';
        return;
    }
    
    let allDocuments = [];
    
    try {
        // 1. Ülke bazlı belgeleri getir (country_documents tablosundan)
        if (countryId) {
            const { data: countryDocs, error: countryError } = await supabaseClient
                .from('country_documents')
                .select(`
                    id,
                    is_required,
                    document:document_id (
                        id,
                        name,
                        description
                    )
                `)
                .eq('country_id', parseInt(countryId))
                .eq('application_type', applicationType);
            
            if (countryError) {
                console.error('Ülke belgeleri hatası:', countryError);
            } else if (countryDocs && countryDocs.length > 0) {
                console.log(`${countryDocs.length} ülke bazlı belge bulundu`);
                allDocuments.push(...countryDocs);
            }
        }
        
        // 2. Hizmet bazlı belgeleri getir (documents tablosundan service_id ile)
        if (serviceId) {
            const { data: serviceDocs, error: serviceError } = await supabaseClient
                .from('documents')
                .select('*')
                .eq('service_id', parseInt(serviceId));
            
            if (serviceError) {
                console.error('Hizmet belgeleri hatası:', serviceError);
            } else if (serviceDocs && serviceDocs.length > 0) {
                console.log(`${serviceDocs.length} hizmet bazlı belge bulundu`);
                // Format dönüşümü yap
                const formattedDocs = serviceDocs.map(doc => ({
                    id: doc.id,
                    is_required: doc.is_required,
                    document: {
                        id: doc.id,
                        name: doc.name,
                        description: doc.description
                    }
                }));
                allDocuments.push(...formattedDocs);
            }
        }
        
        // 3. Genel belgeleri getir (service_id ve country_id olmayan)
        const { data: generalDocs, error: generalError } = await supabaseClient
            .from('documents')
            .select('*')
            .is('service_id', null)
            .eq('is_required', true);
        
        if (generalError) {
            console.error('Genel belgeler hatası:', generalError);
        } else if (generalDocs && generalDocs.length > 0) {
            console.log(`${generalDocs.length} genel belge bulundu`);
            const formattedGeneral = generalDocs.map(doc => ({
                id: doc.id,
                is_required: doc.is_required,
                document: {
                    id: doc.id,
                    name: doc.name,
                    description: doc.description
                }
            }));
            allDocuments.push(...formattedGeneral);
        }
        
        // Tekrar eden belgeleri kaldır (id'ye göre)
        const uniqueDocs = [];
        const docIds = new Set();
        for (const doc of allDocuments) {
            if (!docIds.has(doc.document.id)) {
                docIds.add(doc.document.id);
                uniqueDocs.push(doc);
            }
        }
        
        console.log('Toplam benzersiz belge:', uniqueDocs.length);
        
        if (uniqueDocs.length > 0) {
            container.innerHTML = uniqueDocs.map(doc => `
                <div class="border rounded-lg p-3 ${doc.is_required ? 'border-l-4 border-l-red-500 bg-red-50/30' : 'border-l-4 border-l-gray-300'}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <label class="font-medium ${doc.is_required ? 'text-red-600' : 'text-gray-700'}">
                                    ${escapeHtml(doc.document.name)} ${doc.is_required ? '<span class="text-red-500">*</span>' : ''}
                                </label>
                                ${doc.is_required ? 
                                    '<span class="text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-700">Zorunlu</span>' : 
                                    '<span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">Opsiyonel</span>'}
                            </div>
                            <p class="text-xs text-gray-500 mt-1">${escapeHtml(doc.document.description) || 'Açıklama yok'}</p>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <div class="flex items-center gap-2">
                                <input type="file" 
                                       data-doc-id="${doc.document.id}" 
                                       data-doc-name="${escapeHtml(doc.document.name)}"
                                       data-is-required="${doc.is_required}"
                                       class="visaDocFile hidden" 
                                       accept=".pdf,.jpg,.jpeg,.png">
                                <button type="button" onclick="this.previousElementSibling.click()" 
                                        class="text-blue-600 text-sm border border-blue-600 rounded px-3 py-1 hover:bg-blue-50 transition">
                                    📎 Dosya Seç
                                </button>
                                <span id="visaStatus_${doc.document.id}" class="text-xs px-2 py-1 rounded ${doc.is_required ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-600'}">
                                    ${doc.is_required ? '❌ Eksik' : '📄 Bekliyor'}
                                </span>
                            </div>
                            <div id="visaFileInfo_${doc.document.id}" class="text-xs text-gray-400 mt-1 max-w-[200px] truncate"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="text-center py-8">
                    <p class="text-gray-500">📭 Bu başvuru için belge gereksinimi bulunmuyor.</p>
                    <p class="text-xs text-gray-400 mt-2">Başvuruya devam edebilirsiniz.</p>
                </div>
            `;
        }
        
        // Lucide ikonlarını yenile
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        
    } catch (error) {
        console.error('Belge yükleme hatası:', error);
        container.innerHTML = '<p class="text-red-500 text-center py-4">Belgeler yüklenirken hata oluştu.</p>';
    }
}
    
    // Vize fiyatını güncelle
function updateVisaPrice() {
    const serviceSelect = document.getElementById('visaService');
    const selectedOption = serviceSelect?.options[serviceSelect.selectedIndex];
    const fee = parseFloat(selectedOption?.dataset?.price) || 80;
    const totalSpan = document.getElementById('visaTotalAmount');
    if (totalSpan) totalSpan.innerHTML = `€${(fee * 1.1).toFixed(2)}`;
}

    
// Ülke bilgilerini güncelle
function updateVisaCountryInfo() {
    const select = document.getElementById('visaCountry');
    const option = select?.options[select.selectedIndex];
    if (option?.value) {
        const infoDiv = document.getElementById('visaCountryInfo');
        if (infoDiv) infoDiv.classList.remove('hidden');
        const daysSpan = document.getElementById('visaProcessDays');
        if (daysSpan) daysSpan.innerHTML = option.dataset.days || '15';
        const rateSpan = document.getElementById('visaSuccessRate');
        if (rateSpan) rateSpan.innerHTML = option.dataset.rate || '75';
        const feeSpan = document.getElementById('visaFeeCountry');
        if (feeSpan) feeSpan.innerHTML = option.dataset.fee || '80';
    }
}
    
    // ========== VİZE FORM YARDIMCI FONKSİYONLARI ==========
function nextVisaStep() {
    // STEP 2'den STEP 3'e geçerken kontrol
    if (currentVisaStep === 2) {
        const country = document.getElementById('visaCountry')?.value;
        const service = document.getElementById('visaService')?.value;
        if (!country) { showMessage('Lütfen hedef ülke seçin', 'error'); return; }
        if (!service) { showMessage('Lütfen hizmet seçin', 'error'); return; }
    }
    
    if (currentVisaStep < visaTotalSteps) {
        document.getElementById(`visaStep${currentVisaStep}`).classList.add('hidden');
        currentVisaStep++;
        document.getElementById(`visaStep${currentVisaStep}`).classList.remove('hidden');
        updateVisaStepIndicator();
        
        // Belgeler adımında listeyi yenile
        if (currentVisaStep === 4) {
            loadVisaDocuments();
        }
    }
}
function prevVisaStep() {
    if (currentVisaStep > 1) {
        document.getElementById(`visaStep${currentVisaStep}`).classList.add('hidden');
        currentVisaStep--;
        document.getElementById(`visaStep${currentVisaStep}`).classList.remove('hidden');
        updateVisaStepIndicator();
    }
}

function updateVisaStepIndicator() {
    const steps = document.querySelectorAll('#visaAppForm .flex.mb-6.border-b > div');
    steps.forEach((step, idx) => {
        if (idx + 1 === currentVisaStep) {
            step.classList.add('text-[#D4A017]', 'font-bold');
            step.classList.remove('text-gray-500');
        } else {
            step.classList.remove('text-[#D4A017]', 'font-bold');
            step.classList.add('text-gray-500');
        }
    });
}

// ========== İMZA İŞLEMLERİ ==========
let drawing = false;
let signatureCanvas = null;
let signatureCtx = null;

function openSignatureModal() {
    const modal = document.getElementById('signatureModal');
    if (!modal) { showMessage('İmza sistemi hatası!', 'error'); return; }
    modal.classList.add('active');
    
    signatureCanvas = document.getElementById('signatureCanvasModal');
    if (!signatureCanvas) return;
    
    signatureCanvas.width = 450;
    signatureCanvas.height = 150;
    signatureCtx = signatureCanvas.getContext('2d');
    signatureCtx.strokeStyle = '#000';
    signatureCtx.lineWidth = 2;
    signatureCtx.lineCap = 'round';
    signatureCtx.fillStyle = '#fff';
    signatureCtx.fillRect(0, 0, signatureCanvas.width, signatureCanvas.height);
    drawing = false;
    
    signatureCanvas.removeEventListener('mousedown', startDrawing);
    signatureCanvas.removeEventListener('mousemove', draw);
    signatureCanvas.removeEventListener('mouseup', stopDrawing);
    signatureCanvas.removeEventListener('touchstart', startDrawing);
    signatureCanvas.removeEventListener('touchmove', draw);
    signatureCanvas.removeEventListener('touchend', stopDrawing);
    
    signatureCanvas.addEventListener('mousedown', startDrawing);
    signatureCanvas.addEventListener('mousemove', draw);
    signatureCanvas.addEventListener('mouseup', stopDrawing);
    signatureCanvas.addEventListener('touchstart', startDrawing);
    signatureCanvas.addEventListener('touchmove', draw);
    signatureCanvas.addEventListener('touchend', stopDrawing);
}

function startDrawing(e) { drawing = true; const pos = getCanvasCoordinates(e); signatureCtx.beginPath(); signatureCtx.moveTo(pos.x, pos.y); signatureCtx.stroke(); }
function draw(e) { if (!drawing) return; e.preventDefault(); const pos = getCanvasCoordinates(e); signatureCtx.lineTo(pos.x, pos.y); signatureCtx.stroke(); signatureCtx.beginPath(); signatureCtx.moveTo(pos.x, pos.y); }
function stopDrawing() { drawing = false; signatureCtx.beginPath(); }

function getCanvasCoordinates(e) {
    const rect = signatureCanvas.getBoundingClientRect();
    const scaleX = signatureCanvas.width / rect.width;
    const scaleY = signatureCanvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
    else { clientX = e.clientX; clientY = e.clientY; }
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function clearSignature() {
    if (signatureCtx && signatureCanvas) {
        signatureCtx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);
        signatureCtx.fillStyle = '#fff';
        signatureCtx.fillRect(0, 0, signatureCanvas.width, signatureCanvas.height);
    }
}

function saveSignature() {
    if (!signatureCanvas) { showMessage('İmza alanı bulunamadı!', 'error'); return; }
    const signatureData = signatureCanvas.toDataURL();
    let visaSignatureInput = document.getElementById('visaSignature');
    if (!visaSignatureInput) {
        const newInput = document.createElement('input');
        newInput.type = 'hidden';
        newInput.id = 'visaSignature';
        newInput.name = 'visaSignature';
        document.getElementById('visaStep7').appendChild(newInput);
        visaSignatureInput = document.getElementById('visaSignature');
    }
    if (visaSignatureInput) visaSignatureInput.value = signatureData;
    const previewDiv = document.getElementById('signaturePad');
    if (previewDiv) {
        previewDiv.innerHTML = `<img src="${signatureData}" style="max-height:80px; margin:0 auto;"><span class="text-green-600 text-sm block mt-1">✓ İmza alındı</span>`;
        previewDiv.classList.add('bg-green-50');
    }
    closeSignatureModal();
    showMessage('İmza başarıyla kaydedildi!', 'success');
}

function closeSignatureModal() {
    const modal = document.getElementById('signatureModal');
    if (modal) modal.classList.remove('active');
    if (signatureCanvas) {
        signatureCanvas.removeEventListener('mousedown', startDrawing);
        signatureCanvas.removeEventListener('mousemove', draw);
        signatureCanvas.removeEventListener('mouseup', stopDrawing);
    }
}

async function renderVisaApplications() {

            .from('services')
            .select('id')
            .eq('service_type', 'visa');

        }
        
        let query = supabaseClient
            .from('applications')
            .select(`
                *,
                services:service_id (
                    id,
                    name,
                    service_type
                ),
                customer:user_id (
                    id,
                    full_name,
                    phone
                )
            `)
            .in('service_id', visaServiceIds)
            .order('created_at', { ascending: false });
        
        if (currentRole === 'customer') {
            query = query.eq('user_id', currentUser.id);
        } else if (currentRole === 'representative') {
            query = query.eq('representative_id', currentUser.id);
        }
        
        const { data: apps, error } = await query;
        
        if (error) {
            return `<div class="card text-center text-red-600">Veri yüklenirken hata: ${error.message}</div>`;
        }
        
        if (!apps || apps.length === 0) {
            return `

                    <p class="text-gray-500 mb-4">Henüz vize başvurunuz bulunmuyor.</p>

                </div>
            `;
        }
        
        // Randevu durumu kontrol fonksiyonu
        function getAppointmentStatus(appointmentDate) {
            if (!appointmentDate) {
                return { text: 'Randevu aranıyor', class: 'bg-yellow-100 text-yellow-700', icon: '⏳' };
            }
            const appDate = new Date(appointmentDate);
            const today = new Date();
            if (appDate > today) {
                return { text: `Randevu: ${formatDate(appointmentDate)}`, class: 'bg-blue-100 text-blue-700', icon: '📅' };
            } else if (appDate.toDateString() === today.toDateString()) {
                return { text: `Randevu: BUGÜN!`, class: 'bg-green-100 text-green-700', icon: '✅' };
            } else {
                return { text: `Randevu: ${formatDate(appointmentDate)}`, class: 'bg-gray-100 text-gray-600', icon: '📅' };

        }
        
        return `

                        const appointmentStatus = getAppointmentStatus(app.appointment_date);
                        return `

                                        <p class="text-sm text-gray-500">📅 Başvuru Tarihi: ${formatDate(app.created_at)}</p>
                                        
                                        <!-- Randevu Durumu -->
                                        <div class="mt-2">
                                            <div class="flex items-center gap-2">
                                                <span class="text-lg">${appointmentStatus.icon}</span>
                                                <span class="text-sm ${appointmentStatus.class} px-2 py-1 rounded-full inline-flex items-center gap-1">
                                                    ${appointmentStatus.text}

                                        <p class="mt-2 font-semibold text-[#0B3C6D]">Tutar: ${formatCurrency(app.total_price_eur || 0)}</p>
                                        ${currentRole !== 'customer' ? `<p class="text-sm text-gray-500 mt-1">👤 Müşteri: ${escapeHtml(app.customer?.full_name || 'İsimsiz')}</p>` : ''}
                                    </div>
                                    <div>
                                        <button class="btn-primary text-sm px-4 py-2" onclick="event.stopPropagation();viewApplicationDetail(${app.id})">Detay Gör</button>

async function renderVisaStatistics() {
    try {
        // Tüm vize başvurularını al
        const { data: visaServices } = await supabaseClient
            .from('services')
            .select('id, name, country_id')
            .eq('service_type', 'visa');
        
        const visaServiceIds = visaServices?.map(s => s.id) || [];
        
        let query = supabaseClient
            .from('applications')
            .select(`
                *,
                services:service_id (id, name, service_type),
                customer:user_id (id, full_name, phone),
                country:services!service_id (country_id)
            `)
            .in('service_id', visaServiceIds)
            .order('created_at', { ascending: false });
        
        // Admin değilse sadece kendi başvuruları
        if (currentRole !== 'admin') {
            query = query.eq('user_id', currentUser.id);
        }
        
        const { data: apps, error } = await query;
        
        if (error) {
            console.error('Veri çekme hatası:', error);
            return `<div class="card text-center text-red-600">Veri yüklenirken hata: ${error.message}</div>`;
        }
        
        // Ülkeleri al
        const { data: countries } = await supabaseClient
            .from('countries')
            .select('*')
            .order('name');
        
        const countryMap = new Map();
        countries?.forEach(c => countryMap.set(c.id, c));
        
        // İstatistikler
        const totalApps = apps?.length || 0;
        const pendingApps = apps?.filter(a => a.status === 'pending' || a.status === 'documents_uploaded').length || 0;
        const approvedApps = apps?.filter(a => a.status === 'approved').length || 0;
        const rejectedApps = apps?.filter(a => a.status === 'rejected').length || 0;
        const completedApps = apps?.filter(a => a.status === 'completed').length || 0;
        const totalAmount = apps?.reduce((sum, a) => sum + (a.total_price_eur || 0), 0) || 0;
        
        // Ülke bazlı istatistikler
        const countryStats = new Map();
        for (const app of (apps || [])) {
            // Service üzerinden country_id'yi bul
            const serviceId = app.service_id;
            const service = visaServices?.find(s => s.id === serviceId);
            const countryId = service?.country_id;
            
            if (!countryStats.has(countryId)) {
                countryStats.set(countryId, { total: 0, amount: 0, pending: 0, approved: 0 });
            }
            const stats = countryStats.get(countryId);
            stats.total++;
            stats.amount += (app.total_price_eur || 0);
            if (app.status === 'pending' || app.status === 'documents_uploaded') stats.pending++;
            if (app.status === 'approved') stats.approved++;
        }
        
        // Aylık istatistikler
        const monthlyStats = new Map();
        for (const app of (apps || [])) {
            const date = new Date(app.created_at);
            const monthKey = `${date.getFullYear()}-${date.getMonth() + 1}`;
            const monthName = date.toLocaleString('tr-TR', { month: 'long', year: 'numeric' });
            
            if (!monthlyStats.has(monthKey)) {
                monthlyStats.set(monthKey, { name: monthName, total: 0, amount: 0 });
            }
            const stats = monthlyStats.get(monthKey);
            stats.total++;
            stats.amount += (app.total_price_eur || 0);
        }
        
        const sortedMonths = Array.from(monthlyStats.entries()).sort((a, b) => a[0].localeCompare(b[0])).slice(-6);
        
        return `
            <div class="space-y-6">

// Vize istatistiklerini Excel'e aktar
window.exportVisaStatistics = async () => {
    try {
        const { data: visaServices } = await supabaseClient
            .from('services')
            .select('id, name')
            .eq('service_type', 'visa');
        
        const visaServiceIds = visaServices?.map(s => s.id) || [];
        
        const { data: apps } = await supabaseClient
            .from('applications')
            .select(`
                *,
                services:service_id (name),
                customer:user_id (full_name, phone)
            `)
            .in('service_id', visaServiceIds)
            .order('created_at', { ascending: false });
        
        // CSV oluştur
        const headers = ['Başvuru No', 'Müşteri Adı', 'Telefon', 'Hizmet', 'Tutar (€)', 'Durum', 'Başvuru Tarihi', 'Ödeme Durumu'];
        const rows = apps?.map(app => [
            app.id,
            app.customer?.full_name || '-',
            app.customer?.phone || '-',
            app.services?.name || '-',
            app.total_price_eur || 0,
            getStatusText(app.status),
            formatDate(app.created_at),
            app.payment_status === 'completed' ? 'Ödendi' : 'Beklemede'
        ]) || [];
        
        const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', `vize_istatistikleri_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showMessage('✅ İstatistikler dışa aktarıldı', 'success');
    } catch (error) {
        showMessage('Dışa aktarma hatası: ' + error.message, 'error');
    }
};

window.toggleVisaCountryActive = async (countryId, isActive) => {
    try {
        const { error } = await supabaseClient
            .from('countries')
            .update({ visa_active: isActive, updated_at: new Date() })
            .eq('id', countryId);
        
        if (error) throw error;
        showMessage(`Vize başvuruları ${isActive ? 'aktifleştirildi' : 'pasifleştirildi'}`, 'success');

        showMessage('Güncellenemedi: ' + error.message, 'error');
        location.reload();
    }
};

// Vize ayarını güncelle
window.updateVisaSetting = async (countryId, field, value) => {
    try {
        const updateData = { updated_at: new Date() };
        
        if (field === 'visa_processing_days') {
            updateData.visa_processing_days = parseInt(value);
        } else if (field === 'visa_fee_eur') {
            updateData.visa_fee_eur = parseFloat(value);
        } else if (field === 'visa_success_rate') {
            updateData.visa_success_rate = parseFloat(value);
        } else if (field === 'visa_service_id') {
            updateData.visa_service_id = value ? parseInt(value) : null;
        }
        
        const { error } = await supabaseClient
            .from('countries')
            .update(updateData)
            .eq('id', countryId);
        
        if (error) throw error;
        showMessage('Ayar güncellendi', 'success');
    } catch (error) {
        showMessage('Güncellenemedi: ' + error.message, 'error');
    }
};

// Vize gereksinimlerini kaydet
window.saveVisaRequirements = async (countryId) => {
    try {
        const { data: country } = await supabaseClient
            .from('countries')
            .select('name, visa_requirements')
            .eq('id', countryId)
            .single();
        
        document.getElementById('visaReqCountryId').value = countryId;
        document.getElementById('visaReqCountryName').value = country?.name || '';
        document.getElementById('visaRequirementsText').value = country?.visa_requirements || '';
        
        document.getElementById('visaRequirementsModal').classList.add('active');
    } catch (error) {
        showMessage('Gereksinimler yüklenemedi', 'error');

};

window.closeVisaRequirementsModal = () => {
    document.getElementById('visaRequirementsModal').classList.remove('active');
};

    document.getElementById('addVisaServiceModal').classList.add('active');
};

window.closeAddVisaServiceModal = () => {
    document.getElementById('addVisaServiceModal').classList.remove('active');
};

// Vize servisini düzenle
window.editVisaService = async (serviceId) => {
    try {
        const { data: service } = await supabaseClient
            .from('services')
            .select('*')
            .eq('id', serviceId)
            .single();
        
        if (!service) {
            showMessage('Servis bulunamadı', 'error');
            return;
        }
        
        const newName = prompt('Servis Adı:', service.name);
        if (newName && newName !== service.name) {
            const { error } = await supabaseClient
                .from('services')
                .update({ name: newName, updated_at: new Date() })
                .eq('id', serviceId);
            
            if (error) throw error;
            showMessage('Servis güncellendi', 'success');
            loadPage('visa-settings');
        }
    } catch (error) {
        showMessage('Güncellenemedi: ' + error.message, 'error');
    }
};

    try {

            .from('services')

        showMessage(`Servis ${isActive ? 'aktifleştirildi' : 'pasifleştirildi'}`, 'success');

document.addEventListener('submit', async (e) => {
    if (e.target.id === 'addVisaServiceForm') {
        e.preventDefault();
        
        const name = document.getElementById('newVisaServiceName').value;
        const countryId = document.getElementById('newVisaServiceCountry').value;
        const price = parseFloat(document.getElementById('newVisaServicePrice').value);

window.filterAccommodationListings = async () => {
    const countryId = document.getElementById('accommodationCountryFilter')?.value;
    const type = document.getElementById('accommodationTypeFilter')?.value;
    
    let query = supabaseClient
        .from('accommodation_listings')
        .select('*, country:country_id(id, name, code)')
        .eq('is_active', true);
    
    if (countryId && countryId !== 'all') {
        query = query.eq('country_id', parseInt(countryId));
    }
    if (type && type !== 'all') {
        query = query.eq('type', type);
    }
    
    const { data: accommodations } = await query.order('created_at', { ascending: false });
    const container = document.getElementById('accommodationListingsContainer');
    if (container) {
        container.innerHTML = renderAccommodationCards(accommodations || []);
    }
};

window.filterJobListings = async () => {

    let query = supabaseClient
        .from('job_postings')
        .select('*, country:country_id(id, name, code)')
        .eq('is_active', true);

window.confirmPayment = async (appId) => {
  if (confirm('Bu başvurunun ödemesini onaylıyor musunuz?')) {
    const transactionId = 'PAY-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8).toUpperCase();
    
    const { error: paymentError } = await supabaseClient
      .from('payments')
      .update({ 
        status: 'completed', 
        paid_at: new Date(),
        transaction_id: transactionId
      })
      .eq('application_id', appId);
    
    if (paymentError) {
      showMessage('Ödeme onaylanamadı: ' + paymentError.message, 'error');
      return;
    }
    
    const { data: app, error: appError } = await supabaseClient
      .from('applications')
      .select('commission_amount_eur, branch_id, representative_id, total_price_eur')
      .eq('id', appId)
      .single();
    
    if (appError) {
      showMessage('Başvuru bilgileri alınamadı', 'error');
      return;
    }
    
    const { error: updateError } = await supabaseClient
      .from('applications')
      .update({ 
        payment_status: 'completed', 
        paid_at: new Date(),
        status: 'documents_uploaded',
        updated_at: new Date()
      })
      .eq('id', appId);
    
    if (updateError) {
      showMessage('Başvuru güncellenemedi: ' + updateError.message, 'error');
      return;
    }
    
    if (app.representative_id) {
      const { data: existingEarning } = await supabaseClient
        .from('earnings')
        .select('id')
        .eq('application_id', appId)
        .single();
      
      if (!existingEarning) {
        await supabaseClient.from('earnings').insert({
          branch_id: app.branch_id,
          application_id: appId,
          representative_id: app.representative_id,
          amount_eur: app.commission_amount_eur,
          paid_amount_eur: 0,
          remaining_amount_eur: app.commission_amount_eur,
          status: 'pending'
        });
      }
    }
    
    showMessage('Ödeme onaylandı ve hakediş oluşturuldu', 'success');
    closeModal();
    loadPage(currentPage);
  }
};

window.verifyDocument = async (appDocId, applicationId) => {
  if (!confirm('Bu belgeyi onaylamak istediğinizden emin misiniz?')) return;
  
  try {
    const { error } = await supabaseClient
      .from('application_documents')
      .update({ 
        verified: true, 
        verified_at: new Date().toISOString(), 
        verified_by: currentUser.id 
      })
      .eq('id', appDocId);
    
    if (error) throw error;
    
    showMessage('Belge onaylandı ✓', 'success');
    
    // Tüm belgeler onaylandı mı kontrol et
    const { data: allDocs } = await supabaseClient
      .from('application_documents')
      .select('verified')
      .eq('application_id', applicationId);
    
    const allVerified = allDocs?.every(doc => doc.verified === true);
    
    if (allVerified && allDocs?.length > 0) {
      // Tüm belgeler onaylandıysa başvuru durumunu güncelle
      await supabaseClient
        .from('applications')
        .update({ 
          status: 'under_review',
          updated_at: new Date().toISOString()
        })
        .eq('id', applicationId);
      
      showMessage('Tüm belgeler onaylandı! Başvuru incelemeye alındı.', 'success');
    }
    
    window.viewApplicationDetail(applicationId);
    
  } catch (error) {
    console.error('Belge onaylama hatası:', error);
    showMessage('Belge onaylanamadı: ' + error.message, 'error');
  }
};

window.deleteApplicationDocument = async (appDocId, filePath, applicationId) => {
  if (!confirm('Bu belgeyi kalıcı olarak silmek istediğinizden emin misiniz?')) return;
  
  try {
    showMessage('Belge siliniyor...', 'info');
    
    // Storage'dan sil
    if (filePath) {
      const { error: storageError } = await supabaseClient.storage
        .from('application-documents')
        .remove([filePath]);
      
      if (storageError) {
        console.error('Storage silme hatası:', storageError);
      }
    }
    
    // Database'den sil
    const { error: dbError } = await supabaseClient
      .from('application_documents')
      .delete()
      .eq('id', appDocId);
    
    if (dbError) throw dbError;
    
    showMessage('Belge başarıyla silindi', 'success');
    
    // Sayfayı yenile
    if (applicationId) {
      window.viewApplicationDetail(applicationId);
    } else {
      loadPage(currentPage);
    }
    
  } catch (error) {
    console.error('Belge silme hatası:', error);
    showMessage('Belge silinemedi: ' + error.message, 'error');
  }
};

// ========== 7. YARDIMCI FONKSİYONLAR ==========
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  return new Date(dateStr).toLocaleDateString('tr-TR');
}

// ========== 8. BAŞVURU DETAYINDA BELGE LİSTELEME HTML ŞABLONU ==========
function renderDocumentsList(docs, applicationId, currentRole, currentUser) {
  if (!docs || docs.length === 0) {
    return '<p class="text-gray-500 text-center py-4">📭 Henüz belge yüklenmemiş.</p>';
  }
  
  return docs.map(doc => `
    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg mb-2 hover:shadow-md transition">
      <div class="flex-1">
        <div class="flex items-center gap-2">
          ${doc.file_type?.includes('pdf') ? 
            '<i data-lucide="file-pdf" class="w-5 h-5 text-red-500"></i>' : 
            '<i data-lucide="file-image" class="w-5 h-5 text-blue-500"></i>'}
          <span class="font-medium">${escapeHtml(doc.document?.name || 'Belge')}</span>
          ${doc.verified ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">✓ Onaylı</span>' : 
                           '<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded">⏳ Bekliyor</span>'}
        </div>
        <p class="text-xs text-gray-500 mt-1">
          📅 Yüklenme: ${formatDate(doc.uploaded_at)} | 
          📦 Boyut: ${doc.file_size ? (doc.file_size / 1024).toFixed(2) + ' KB' : '-'}
        </p>
        ${doc.document?.description ? `<p class="text-xs text-gray-400 mt-1">📝 ${escapeHtml(doc.document.description)}</p>` : ''}
      </div>
      <div class="flex gap-2">
        <button onclick="viewDocument('${doc.file_url}', '${doc.file_name}', '${doc.file_type || ''}')" 
                class="text-blue-600 hover:text-blue-800 text-sm px-2 py-1 rounded hover:bg-blue-50">
          👁️ Görüntüle
        </button>
        ${currentRole === 'representative' && !doc.verified ? `
          <button onclick="verifyDocument(${doc.id}, ${applicationId})" 
                  class="text-green-600 hover:text-green-800 text-sm px-2 py-1 rounded hover:bg-green-50">
          ✓ Onayla
          </button>
        ` : ''}
        ${(currentRole === 'admin' || currentRole === 'representative') ? `
          <button onclick="deleteApplicationDocument(${doc.id}, '${doc.file_id}', ${applicationId})" 
                  class="text-red-600 hover:text-red-800 text-sm px-2 py-1 rounded hover:bg-red-50">
          🗑️ Sil
          </button>
        ` : ''}
      </div>
    </div>
  `).join('');
}

/**
 * PDFLib kütüphanesini yükle
 */
async function loadPDFLib() {
    return new Promise((resolve, reject) => {
        if (typeof PDFLib !== 'undefined') {
            console.log('✅ PDFLib zaten yüklü');
            resolve();
            return;
        }
        
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';
        script.onload = () => {
            console.log('✅ PDFLib yüklendi');
            resolve();
        };
        script.onerror = () => reject(new Error('PDFLib yüklenemedi'));
        document.head.appendChild(script);
    });
}

/**
 * Resmi JPG'ye dönüştür (kalite korumalı)
 */
async function convertToJPG(file, quality = 0.9) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            canvas.toBlob((blob) => {
                URL.revokeObjectURL(url);
                const jpgFile = new File([blob], file.name.replace(/\.(png|jpg|jpeg|bmp|gif)$/i, '.jpg'), {
                    type: 'image/jpeg',
                    lastModified: Date.now()
                });
                resolve(jpgFile);
            }, 'image/jpeg', quality);
        };
        
        img.onerror = reject;
        img.src = url;
    });
}

/**
 * Tüm dosyaları tek PDF'te birleştir
 */
async function convertAllToSinglePDF(files, applicationId) {
    try {
        await loadPDFLib();
        
        const pdfDoc = await PDFLib.PDFDocument.create();
        let pageCount = 0;
        const convertedFiles = [];
        
        for (const file of files) {
            const fileExt = file.name.split('.').pop().toLowerCase();
            let processedFile = file;
            
            // PNG/Resimleri JPG'ye dönüştür
            if (fileExt === 'png' || fileExt === 'bmp' || fileExt === 'gif') {
                processedFile = await convertToJPG(file, 0.9);
                console.log(`🔄 ${file.name} → JPG dönüştürüldü`);
                convertedFiles.push({ original: file.name, converted: processedFile.name, type: 'image' });
            } else if (fileExt === 'jpg' || fileExt === 'jpeg') {
                console.log(`📸 ${file.name} JPG olarak işleniyor`);
                convertedFiles.push({ original: file.name, converted: file.name, type: 'image' });
            } else if (fileExt === 'pdf') {
                console.log(`📄 ${file.name} PDF olarak işleniyor`);
                convertedFiles.push({ original: file.name, converted: file.name, type: 'pdf' });
            }
            
            // PDF'e ekle
            try {
                if (processedFile.type === 'application/pdf') {
                    // PDF ise sayfaları içe aktar
                    const existingPdf = await PDFLib.PDFDocument.load(await processedFile.arrayBuffer());
                    const pages = await pdfDoc.copyPages(existingPdf, existingPdf.getPageIndices());
                    pages.forEach(page => {
                        pdfDoc.addPage(page);
                        pageCount++;
                    });
                } else {
                    // Resim ise JPG olarak göm
                    const imageBytes = await processedFile.arrayBuffer();
                    const jpgImage = await pdfDoc.embedJpg(imageBytes);
                    const page = pdfDoc.addPage([jpgImage.width, jpgImage.height]);
                    page.drawImage(jpgImage);
                    pageCount++;
                }
            } catch (err) {
                console.error(`❌ ${file.name} eklenemedi:`, err);
            }
        }
        
        if (pageCount === 0) {
            throw new Error('Hiçbir dosya PDF\'e dönüştürülemedi');
        }
        
        const pdfBytes = await pdfDoc.save();
        const pdfFileName = `application_${applicationId}_${Date.now()}.pdf`;
        const pdfFile = new File([pdfBytes], pdfFileName, {
            type: 'application/pdf',
            lastModified: Date.now()
        });
        
        const totalOriginalSize = files.reduce((sum, f) => sum + f.size, 0);
        const savedSpace = ((totalOriginalSize - pdfBytes.length) / 1024 / 1024).toFixed(2);
        
        console.log(`✅ PDF oluşturuldu: ${pageCount} sayfa, ${(pdfBytes.length / 1024).toFixed(2)} KB`);
        console.log(`💾 Tasarruf: ${savedSpace} MB (${((1 - pdfBytes.length / totalOriginalSize) * 100).toFixed(1)}%)`);
        
        return { pdfFile, pageCount, savedSpace, convertedFiles };
        
    } catch (error) {
        console.error('PDF dönüşüm hatası:', error);
        throw error;
    }
}

/**
 * PDF'i Supabase Storage'a yükle
 */
async function uploadPDFToSupabase(pdfFile, applicationId, metadata) {
    try {
        const timestamp = Date.now();
        const fileName = `application_${applicationId}_${timestamp}.pdf`;
        const filePath = `${applicationId}/${fileName}`;
        
        console.log(`📤 PDF yükleniyor: ${fileName} (${(pdfFile.size / 1024).toFixed(2)} KB)`);
        
        const { data, error } = await supabaseClient.storage
            .from('application-documents')
            .upload(filePath, pdfFile, {
                cacheControl: '3600',
                upsert: false,
                contentType: 'application/pdf'
            });
        
        if (error) throw error;
        
        const { data: { publicUrl } } = supabaseClient.storage
            .from('application-documents')
            .getPublicUrl(filePath);
        
        // Tek bir kayıt olarak veritabanına ekle
        const { error: insertError } = await supabaseClient
            .from('application_documents')
            .insert({
                application_id: applicationId,
                document_id: null,
                file_id: data.path,
                file_url: publicUrl,
                file_name: fileName,
                file_size: pdfFile.size,
                file_type: 'application/pdf',
                uploaded_at: new Date().toISOString(),
                verified: false,
                metadata: metadata
            });
        
        if (insertError) throw insertError;
        
        console.log(`✅ PDF başarıyla yüklendi`);
        return { success: true, fileUrl: publicUrl, filePath: data.path };
        
    } catch (error) {
        console.error('❌ PDF yükleme hatası:', error);
        return { success: false, error: error.message };
    }
}

            showMessage('Hakediş bilgileri alınamadı: ' + earningError.message, 'error');
            return;
        }
        
        if (amount > earning.remaining_amount_eur) {
            showMessage(`Ödeme tutarı kalan tutardan (${formatCurrency(earning.remaining_amount_eur)}) büyük olamaz`, 'error');
            return;
        }
        
        const newPaidAmount = (earning.paid_amount_eur || 0) + amount;
        const newRemainingAmount = earning.amount_eur - newPaidAmount;
        const newStatus = newRemainingAmount <= 0 ? 'completed' : 'partial';
        
        await supabaseClient
            .from('earnings')
            .update({
                paid_amount_eur: newPaidAmount,
                remaining_amount_eur: newRemainingAmount,
                status: newStatus,
                updated_at: new Date()
            })
            .eq('id', earningId);
        
        const { error: paymentError } = await supabaseClient
            .from('branch_commission_payments')
            .insert({
                branch_id: earning.branch_id,
                bank_id: parseInt(bankId),
                application_id: earning.application_id,
                amount_eur: amount,
                transaction_id: transactionId,
                status: 'completed',
                paid_at: new Date()
            });
        
        if (paymentError) {
            showMessage('Ödeme kaydedilemedi: ' + paymentError.message, 'error');
        } else {
            showMessage(`✅ ${formatCurrency(amount)} tutarındaki ödeme başarıyla tamamlandı!`, 'success');
            loadPage('commission-payments');
        }
    }
    
}); // <--- ANA EVENT LISTENER'IN KAPANIŞI (TEK BURADA)
