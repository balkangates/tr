document.addEventListener('submit', async (e) => {
    
    if (e.target.id === 'newAppForm') {
        e.preventDefault();

        // Form değerlerini al
        const serviceId = document.getElementById('serviceSelect').value;
        const representativeSelect = document.getElementById('representativeSelect');
        const representativeId = representativeSelect?.value || null;
        const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || 'bank_transfer';
        const selectedOption = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex];
        
        const price = parseFloat(selectedOption?.dataset.price || 0);
        const commissionAmount = parseFloat(selectedOption?.dataset.commission || 0);

        if (!serviceId) {
            showMessage('Lütfen bir hizmet seçin', 'error');
            return;
        }

        const fileInputs = document.querySelectorAll('.docFile');
        const files = [];
        const documentsData = [];
        
        for (const fileInput of fileInputs) {
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                files.push(file);
                documentsData.push({
                    docId: fileInput.dataset.docId,
                    docName: fileInput.dataset.docName || 'Belge',
                    fileName: file.name,
                    fileType: file.type,
                    fileSize: file.size
                });
            }
        }

        if (files.length === 0) {
            showMessage('Lütfen en az bir belge yükleyin', 'error');
            return;
        }

        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> PDF Dönüştürülüyor...';

        try {
            showMessage('📄 Belgeler PDF\'e dönüştürülüyor...', 'info');
            const { pdfFile, pageCount, savedSpace, convertedFiles } = await convertAllToSinglePDF(files, Date.now());
            
            showMessage(`✅ PDF oluşturuldu (${pageCount} sayfa, ${savedSpace} MB tasarruf)`, 'success');

            let branchId = null;
            if (representativeId) {
                const { data: rep } = await supabaseClient
                    .from('profiles')
                    .select('branch_id')
                    .eq('id', representativeId)
                    .single();
                branchId = rep?.branch_id;
            } else {
                const { data: service } = await supabaseClient
                    .from('services')
                    .select('country_id')
                    .eq('id', serviceId)
                    .single();
                const { data: branch } = await supabaseClient
                    .from('branches')
                    .select('id')
                    .eq('country_id', service.country_id)
                    .limit(1)
                    .single();
                branchId = branch?.id;
            }

            submitBtn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> Başvuru Kaydediliyor...';
            
            const { data: newApp, error: appError } = await supabaseClient
                .from('applications')
                .insert({
                    user_id: currentUser.id,
                    service_id: parseInt(serviceId),
                    total_price_eur: price,
                    commission_amount_eur: commissionAmount,
                    status: 'pending',
                    payment_method: paymentMethod,
                    payment_status: 'pending',
                    branch_id: branchId,
                    representative_id: representativeId || null
                })
                .select()
                .single();

            if (appError) throw new Error('Başvuru oluşturulamadı: ' + appError.message);
            
            const applicationId = newApp.id;
    const jobId = document.getElementById('selectedJobId')?.value;
    const jobApplicationId = document.getElementById('selectedJobApplicationId')?.value;
    
    // İş başvuru kaydını güncelle
    if (jobApplicationId) {
        const { error: updateJobAppError } = await supabaseClient
            .from('job_applications')
            .update({
                application_id: applicationId,
                status: 'processing',
                updated_at: new Date().toISOString()
            })
            .eq('id', parseInt(jobApplicationId));
        
        if (updateJobAppError) {
            console.error('İş başvurusu güncellenemedi:', updateJobAppError);
        } else {
            console.log('✅ İş başvurusu ana başvuru ile ilişkilendirildi');
        }
    }
    
    // localStorage'dan temizle
    localStorage.removeItem('selectedJobId');
    localStorage.removeItem('jobApplicationId');

            submitBtn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> PDF Yükleniyor...';
            
            const metadata = {
                originalFiles: documentsData,
                convertedFiles: convertedFiles,
                pageCount: pageCount,
                savedSpaceMB: savedSpace,
                convertedAt: new Date().toISOString()
            };
            
            const uploadResult = await uploadPDFToSupabase(pdfFile, applicationId, metadata);
            
            if (!uploadResult.success) throw new Error(uploadResult.error);

            await supabaseClient.from('payments').insert({
                application_id: applicationId,
                amount_eur: price,
                commission_amount_eur: commissionAmount,
                payment_method: paymentMethod,
                status: 'pending'
            });

            const totalOriginalSize = files.reduce((sum, f) => sum + f.size, 0);
            const finalSizeMB = (pdfFile.size / 1024 / 1024).toFixed(2);
            const originalSizeMB = (totalOriginalSize / 1024 / 1024).toFixed(2);
            
            showMessage(
                `✅ Başvuru başarıyla oluşturuldu!\n` +
                `📄 ${files.length} belge tek PDF'te birleştirildi.\n` +
                `💾 ${originalSizeMB} MB → ${finalSizeMB} MB (${savedSpace} MB tasarruf)`,
                'success'
            );

            setTimeout(() => {
                if (typeof loadPage === 'function') loadPage('my-applications');
                else location.reload();
            }, 3000);

        } catch (error) {
            console.error('Sistem Hatası:', error);
            showMessage('Bir hata oluştu: ' + error.message, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnText;
        }
    }
    
    // ========== 2. ŞUBE EKLEME FORMU ==========
    if (e.target.id === 'addBranchForm') {
        e.preventDefault();
        const name = document.getElementById('branchName').value;
        const countryId = document.getElementById('branchCountry').value;
        
        if (!name || !countryId) {
            showMessage('Lütfen şube adı ve ülke seçin', 'error');
            return;
        }
        
        const { error } = await supabaseClient.from('branches').insert({
            name: name,
            country_id: parseInt(countryId)
        });
        
        if (error) {
            showMessage('Şube eklenemedi: ' + error.message, 'error');
        } else {
            showMessage('Şube eklendi', 'success');
            loadPage('branches');
        }
    }
    
    // ========== 3. ŞUBE DÜZENLEME FORMU ==========
    if (e.target.id === 'editBranchForm') {
        e.preventDefault();
        
        const branchId = document.getElementById('editBranchId').value;
        const name = document.getElementById('editBranchName').value;
        const countryId = document.getElementById('editBranchCountry').value;
        const address = document.getElementById('editBranchAddress').value;
        const phone = document.getElementById('editBranchPhone').value;
        const email = document.getElementById('editBranchEmail').value;
        
        if (!name || !countryId) {
            showMessage('Lütfen şube adı ve ülke seçin', 'error');
            return;
        }
        
        const { error } = await supabaseClient
            .from('branches')
            .update({
                name: name,
                country_id: parseInt(countryId),
                address: address,
                phone: phone,
                email: email
            })
            .eq('id', parseInt(branchId));
        
        if (error) {
            showMessage('Şube güncellenemedi: ' + error.message, 'error');
        } else {
            showMessage('Şube güncellendi', 'success');
            if (typeof closeEditBranchModal === 'function') closeEditBranchModal();
            loadPage('branches');
        }
    }
    
    // ========== 4. TEMSİLCİ ATAMA FORMU ==========
    if (e.target.id === 'assignRepresentativeForm') {
        e.preventDefault();
        
        const branchId = document.getElementById('assignBranchId').value;
        const representativeId = document.getElementById('assignRepresentativeId').value;
        const branchName = document.getElementById('assignBranchName').value;
        
        if (!representativeId) {
            showMessage('Lütfen bir temsilci seçin', 'error');
            return;
        }
        
        const { data: existing } = await supabaseClient
            .from('representative_branches')
            .select('id')
            .eq('representative_id', representativeId)
            .eq('branch_id', parseInt(branchId))
            .single();
        
        if (existing) {
            showMessage('Bu temsilci zaten bu şubeye atanmış!', 'error');
            return;
        }
        
        const { error } = await supabaseClient
            .from('representative_branches')
            .insert({
                representative_id: representativeId,
                branch_id: parseInt(branchId),
                assigned_at: new Date(),
                assigned_by: currentUser.id
            });
        
        if (error) {
            showMessage('Temsilci atanamadı: ' + error.message, 'error');
        } else {
            showMessage(`✅ Temsilci ${branchName} şubesine atandı`, 'success');
            if (typeof closeAssignRepresentativeModal === 'function') closeAssignRepresentativeModal();
            loadPage('branches');
        }
    }
    
    // ========== 5. HİZMET EKLEME FORMU ==========
    if (e.target.id === 'addServiceForm') {
        e.preventDefault();
        const name = document.getElementById('serviceName').value;
        const description = document.getElementById('serviceDesc').value;
        const price = parseFloat(document.getElementById('servicePrice').value);
        const commissionAmount = parseFloat(document.getElementById('serviceCommission').value);
        const countryId = document.getElementById('serviceCountry').value;
        
        if (!name || !price || !countryId) {
            showMessage('Lütfen tüm zorunlu alanları doldurun', 'error');
            return;
        }
        
        const { error } = await supabaseClient.from('services').insert({
            name: name,
            description: description,
            price_eur: price,
            commission_amount_eur: commissionAmount,
            country_id: parseInt(countryId)
        });
        
        if (error) {
            showMessage('Hizmet eklenemedi: ' + error.message, 'error');
        } else {
            showMessage('Hizmet eklendi', 'success');
            loadPage('services');
        }
    }
    
    // ========== 6. HİZMET DÜZENLEME FORMU ==========
    if (e.target.id === 'editServiceForm') {
        e.preventDefault();
        const serviceId = document.getElementById('editServiceId').value;
        
        const { error } = await supabaseClient
            .from('services')
            .update({
                name: document.getElementById('editServiceName').value,
                description: document.getElementById('editServiceDesc').value,
                price_eur: parseFloat(document.getElementById('editServicePrice').value),
                commission_amount_eur: parseFloat(document.getElementById('editServiceCommission').value),
                country_id: parseInt(document.getElementById('editServiceCountry').value)
            })
            .eq('id', parseInt(serviceId));
        
        if (error) {
            showMessage('Hizmet güncellenemedi: ' + error.message, 'error');
        } else {
            showMessage('Hizmet güncellendi', 'success');
            if (typeof closeEditServiceModal === 'function') closeEditServiceModal();
            loadPage('services');
        }
    }
    
    // ========== 7. ÜLKE EKLEME FORMU ==========
    if (e.target.id === 'addCountryForm') {
        e.preventDefault();
        const name = document.getElementById('countryName').value;
        const code = document.getElementById('countryCode').value.toUpperCase();
        
        if (!name || !code) {
            showMessage('Lütfen ülke adı ve kodunu girin', 'error');
            return;
        }
        
        const { error } = await supabaseClient.from('countries').insert({
            name: name,
            code: code
        });
        
        if (error) {
            showMessage('Ülke eklenemedi: ' + error.message, 'error');
        } else {
            showMessage('Ülke eklendi', 'success');
            loadPage('countries');
        }
    }
    
    // ========== 8. BELGE EKLEME FORMU ==========
    if (e.target.id === 'addDocumentForm') {
        e.preventDefault();
        
        const serviceId = document.getElementById('documentServiceId').value;
        const name = document.getElementById('documentName').value;
        const description = document.getElementById('documentDesc').value;
        const isRequired = document.getElementById('documentRequired').checked;
        
        if (!serviceId) {
            showMessage('Lütfen bir hizmet seçin', 'error');
            return;
        }
        if (!name) {
            showMessage('Lütfen belge adını girin', 'error');
            return;
        }
        
        const { error } = await supabaseClient.from('documents').insert({
            name: name,
            description: description,
            is_required: isRequired,
            service_id: parseInt(serviceId)
        });
        
        if (error) {
            showMessage('Belge eklenemedi: ' + error.message, 'error');
        } else {
            showMessage('Belge eklendi', 'success');
            if (document.getElementById('documentName')) document.getElementById('documentName').value = '';
            if (document.getElementById('documentDesc')) document.getElementById('documentDesc').value = '';
            if (document.getElementById('documentRequired')) document.getElementById('documentRequired').checked = true;
            loadPage('documents');
        }
    }
    
    // ========== 9. BELGE DÜZENLEME FORMU ==========
    if (e.target.id === 'editDocumentForm') {
        e.preventDefault();
        
        const docId = document.getElementById('editDocumentId').value;
        const serviceId = document.getElementById('editDocumentServiceId').value;
        const name = document.getElementById('editDocumentName').value;
        const description = document.getElementById('editDocumentDesc').value;
        const isRequired = document.getElementById('editDocumentRequired').checked;
        
        if (!serviceId) {
            showMessage('Lütfen bir hizmet seçin', 'error');
            return;
        }
        if (!name) {
            showMessage('Lütfen belge adını girin', 'error');
            return;
        }
        
        const { error } = await supabaseClient
            .from('documents')
            .update({
                name: name,
                description: description,
                is_required: isRequired,
                service_id: parseInt(serviceId)
            })
            .eq('id', parseInt(docId));
        
        if (error) {
            showMessage('Belge güncellenemedi: ' + error.message, 'error');
        } else {
            showMessage('Belge güncellendi', 'success');
            if (typeof closeEditDocumentModal === 'function') closeEditDocumentModal();
            loadPage('documents');
        }
    }
    
    // ========== 10. PROFİL GÜNCELLEME FORMU ==========
    if (e.target.id === 'profileForm') {
        e.preventDefault();
        const full_name = document.getElementById('profileFullName').value;
        const phone = document.getElementById('profilePhone').value;
        
        const { error } = await supabaseClient
            .from('profiles')
            .update({ full_name: full_name, phone: phone })
            .eq('id', currentUser.id);
        
        if (error) {
            showMessage('Profil güncellenemedi: ' + error.message, 'error');
        } else {
            showMessage('Profil güncellendi', 'success');
            if (currentProfile) currentProfile.full_name = full_name;
            const userNameEl = document.getElementById('userName');
            if (userNameEl) userNameEl.innerHTML = full_name;
        }
    }
    
    // ========== 11. AYARLAR FORMU ==========
    if (e.target.id === 'settingsForm') {
        e.preventDefault();
        showMessage('Ayarlar kaydedildi', 'success');
    }
    
    // ========== 12. BANKA HESABI EKLEME FORMU ==========
    if (e.target.id === 'addBankForm') {
        e.preventDefault();
        
        const branchId = document.getElementById('bankBranch').value;
        const bankName = document.getElementById('bankName').value;
        const accountHolder = document.getElementById('accountHolder').value;
        const iban = document.getElementById('iban').value;
        const swift = document.getElementById('swift').value;
        
        if (!branchId || !bankName || !accountHolder || !iban) {
            showMessage('Lütfen tüm zorunlu alanları doldurun', 'error');
            return;
        }
        
        const { error } = await supabaseClient.from('banks').insert({
            branch_id: parseInt(branchId),
            bank_name: bankName,
            account_holder: accountHolder,
            iban: iban,
            swift: swift || null
        });
        
        if (error) {
            showMessage('Banka hesabı eklenemedi: ' + error.message, 'error');
        } else {
            showMessage('Banka hesabı eklendi', 'success');
            loadPage('banks');
        }
    }
    
    // ========== 13. BANKA HESABI DÜZENLEME FORMU ==========
    if (e.target.id === 'editBankForm') {
        e.preventDefault();
        const bankId = document.getElementById('editBankId').value;
        
        const { error } = await supabaseClient
            .from('banks')
            .update({
                branch_id: parseInt(document.getElementById('editBankBranch').value),
                bank_name: document.getElementById('editBankName').value,
                account_holder: document.getElementById('editAccountHolder').value,
                iban: document.getElementById('editIban').value,
                swift: document.getElementById('editSwift').value || null
            })
            .eq('id', parseInt(bankId));
        
        if (error) {
            showMessage('Banka hesabı güncellenemedi: ' + error.message, 'error');
        } else {
            showMessage('Banka hesabı güncellendi', 'success');
            if (typeof closeEditBankModal === 'function') closeEditBankModal();
            loadPage('banks');
        }
    }
    
    // ========== 14. KOMİSYON ÖDEMESİ FORMU ==========
    if (e.target.id === 'addCommissionPaymentForm') {
        e.preventDefault();
        
        const earningId = document.getElementById('paymentEarningId').value;
        const bankId = document.getElementById('paymentBankId').value;
        const amount = parseFloat(document.getElementById('paymentAmount').value);
        
        if (!earningId || !bankId || !amount || amount <= 0) {
            showMessage('Lütfen tüm alanları doğru doldurun', 'error');
            return;
        }
        
        const transactionId = 'CMP-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8).toUpperCase();
        
        const { data: earning, error: earningError } = await supabaseClient
            .from('earnings')
            .select('application_id, branch_id, amount_eur, paid_amount_eur, remaining_amount_eur')
            .eq('id', earningId)
            .single();
        
        if (earningError) {
            showMessage('Hakediş bilgileri alınamadı: ' + earningError.message, 'error');
            return;
        }
        
        if (amount > earning.remaining_amount_eur) {
            showMessage(`Ödeme tutarı kalan tutardan (${formatCurrency(earning.remaining_amount_eur)}) büyük olamaz`, 'error');
            return;
        }
        
        const newPaidAmount = (earning.paid_amount_eur || 0) + amount;
        const newRemainingAmount = earning.amount_eur - newPaidAmount;
        const newStatus = newRemainingAmount <= 0 ? 'completed' : 'partial';
        
        await supabaseClient
            .from('earnings')
            .update({
                paid_amount_eur: newPaidAmount,
                remaining_amount_eur: newRemainingAmount,
                status: newStatus,
                updated_at: new Date()
            })
            .eq('id', earningId);
        
        const { error: paymentError } = await supabaseClient
            .from('branch_commission_payments')
            .insert({
                branch_id: earning.branch_id,
                bank_id: parseInt(bankId),
                application_id: earning.application_id,
                amount_eur: amount,
                transaction_id: transactionId,
                status: 'completed',
                paid_at: new Date()
            });
        
        if (paymentError) {
            showMessage('Ödeme kaydedilemedi: ' + paymentError.message, 'error');
        } else {
            showMessage(`✅ ${formatCurrency(amount)} tutarındaki ödeme başarıyla tamamlandı!`, 'success');
            loadPage('commission-payments');
        }
    }
    
}); // <--- ANA EVENT LISTENER'IN KAPANIŞI (TEK BURADA)

// ========== BELGE GÖRÜNTÜLEME FONKSİYONLARI (EVENT LISTENER DIŞINDA) ==========

window.viewDocument = async (fileUrl, fileName, fileType) => {
    console.log("🔍 Görüntülenecek PDF URL:", fileUrl);
    
    if (!fileUrl || fileUrl === 'undefined' || fileUrl === 'null') {
        showMessage('Dosya bulunamadı', 'error');
        return;
    }
    
    const modalHtml = `
        <div id="docViewerModal" class="modal active">
            <div class="modal-content" style="max-width: 1000px; max-height: 90vh; overflow-y: auto;">
                <div class="flex justify-between items-center mb-4 sticky top-0 bg-white pb-3 border-b">
                    <h2 class="text-xl font-bold truncate max-w-[500px]">📄 ${fileName || 'Belge'}</h2>
                    <button onclick="closeDocViewer()" class="text-gray-500 hover:text-gray-700 text-3xl">&times;</button>
                </div>
                
                <div class="border rounded-lg bg-gray-100 min-h-[500px]">
                    <iframe src="${fileUrl}#toolbar=1&navpanes=1&scrollbar=1" 
                            width="100%" height="600" 
                            class="rounded-lg" 
                            allow="autoplay"
                            style="border: none;">
                    </iframe>
                </div>
                
                <div class="mt-4 flex gap-3 sticky bottom-0 bg-white pt-3 border-t">
                    <a href="${fileUrl}" download="${fileName}" class="btn-primary flex-1 text-center py-2">💾 İndir</a>
                    <a href="${fileUrl}" target="_blank" class="btn-secondary flex-1 text-center py-2">🔗 Yeni Sekmede Aç</a>
                    <button onclick="closeDocViewer()" class="btn-secondary flex-1 py-2">Kapat</button>
                </div>
            </div>
        </div>
    `;
    
    const existingModal = document.getElementById('docViewerModal');
    if (existingModal) existingModal.remove();
    document.body.insertAdjacentHTML('beforeend', modalHtml);
};

window.closeDocViewer = () => {
    const modal = document.getElementById('docViewerModal');
    if (modal) modal.remove();
};
    // ========== FORM EVENT HANDLERS ==========
document.addEventListener('change', async (e) => {
  console.log('🔄 Change event tetiklendi, hedef:', e.target.id, e.target.type);
  
  // ========== 1. ÜLKE SEÇİMİ ==========
  if (e.target.id === 'countrySelect') {
    const countryId = e.target.value;
    console.log('🔍 Seçilen ülke ID:', countryId);
    
    const representativeArea = document.getElementById('representativeArea');
    const representativeSelect = document.getElementById('representativeSelect');
    const serviceSelect = document.getElementById('serviceSelect');
    const totalPrice = document.getElementById('totalPrice');
    const commissionInfo = document.getElementById('commissionInfo');
    
    if (!representativeArea) {
      console.error('❌ representativeArea elementi bulunamadı!');
      return;
    }
    
    if (!countryId) {
      representativeArea.style.display = 'none';
      if (serviceSelect) {
        serviceSelect.disabled = true;
        serviceSelect.innerHTML = '<option value="">Önce ülke seçiniz</option>';
      }
      return;
    }
    
    // ===== ŞUBELERİ GETİR =====
    const { data: branches, error: branchError } = await supabaseClient
      .from('branches')
      .select('id, name')
      .eq('country_id', parseInt(countryId));
    
    console.log('🏢 Şubeler:', branches);
    
    if (branchError) {
      console.error('Branch hatası:', branchError);
      representativeArea.style.display = 'none';
    } else if (branches && branches.length > 0) {
      const branchIds = branches.map(b => b.id);
      console.log('🔑 Şube IDleri:', branchIds);
      
      // ===== TEMSİLCİLERİ GETİR (representative_branches tablosundan) =====
      const { data: reps, error: repError } = await supabaseClient
        .from('representative_branches')
        .select(`
          id,
          representative:representative_id (id, full_name, phone, role),
          branch:branch_id (id, name)
        `)
        .in('branch_id', branchIds);
      
      console.log('👥 Temsilciler (representative_branches):', reps);
      
      if (repError) {
        console.error('Temsilci hatası:', repError);
        representativeArea.style.display = 'none';
      } else if (reps && reps.length > 0) {
        // Benzersiz temsilci listesi oluştur
        const uniqueReps = [];
        const repIds = new Set();
        
        for (const item of reps) {
          if (item.representative && !repIds.has(item.representative.id)) {
            repIds.add(item.representative.id);
            uniqueReps.push({
              id: item.representative.id,
              full_name: item.representative.full_name,
              phone: item.representative.phone,
              role: item.representative.role
            });
          }
        }
        
        representativeArea.style.display = 'block';
        representativeSelect.innerHTML = '<option value="">-- Temsilci Seçin (Opsiyonel) --</option>' + 
          uniqueReps.map(r => `<option value="${r.id}">${r.full_name} ${r.phone ? `(${r.phone})` : ''} - ${r.role === 'admin' ? '👑 Admin' : '📋 Temsilci'}</option>`).join('');
        representativeSelect.disabled = false;
        console.log('✅ Temsilci listesi dolduruldu, toplam:', uniqueReps.length);
      } else {
        representativeArea.style.display = 'block';
        representativeSelect.innerHTML = '<option value="">-- Bu ülkede temsilci bulunamadı --</option>';
        representativeSelect.disabled = true;
        console.warn('⚠️ Bu ülkede temsilci bulunamadı');

  // ========== 3. ÖDEME YÖNTEMİ ==========

window.filterVisaApplications = async () => {
  const name = document.getElementById('visaFilterName')?.value;
  const country = document.getElementById('visaFilterCountry')?.value;
  const status = document.getElementById('visaFilterStatus')?.value;
  const dateFrom = document.getElementById('visaFilterDateFrom')?.value;
  const dateTo = document.getElementById('visaFilterDateTo')?.value;
  
  let query = supabaseClient.from('visa_applications').select('*');
  
  if (currentRole === 'customer') {
    query = query.eq('user_id', currentUser.id);
  }
  
  if (name) query = query.ilike('full_name', `%${name}%`);
  if (country && country !== 'all') query = query.eq('target_country', country);
  if (status) query = query.eq('status', status);
  if (dateFrom) query = query.gte('created_at', dateFrom);
  if (dateTo) query = query.lte('created_at', dateTo);
  
  const { data: apps } = await query.order('created_at', { ascending: false });
  
  const container = document.getElementById('visaApplicationsContainer');
  if (container) {
    container.innerHTML = renderVisaApplicationCards(apps || []);
  } else {
    // Sayfayı yenile
    loadPage('visa-applications');
  }
};

window.resetVisaFilters = () => {
  if (document.getElementById('visaFilterName')) document.getElementById('visaFilterName').value = '';
  if (document.getElementById('visaFilterCountry')) document.getElementById('visaFilterCountry').value = '';
  if (document.getElementById('visaFilterStatus')) document.getElementById('visaFilterStatus').value = '';
  if (document.getElementById('visaFilterDateFrom')) document.getElementById('visaFilterDateFrom').value = '';
  if (document.getElementById('visaFilterDateTo')) document.getElementById('visaFilterDateTo').value = '';
  filterVisaApplications();
};

  const statusMap = {
    'pending': 'Beklemede',
    'documents_review': 'Belge İnceleme',
    'appointment_scheduled': 'Randevu Alındı',
    'under_review': 'Konsoloslukta',
    'approved': 'Onaylandı',
    'rejected': 'Reddedildi'
  };
  
  return apps.map(app => `

      <div class="flex justify-between items-start flex-wrap gap-2">

// Vize Form Submit (TABLO UYUMLU)
document.addEventListener('submit', async (e) => {
    if (e.target.id === 'newVisaForm') {
        e.preventDefault();
        
        if (!currentUser || !currentUser.id) {
            showMessage('Lütfen önce giriş yapın', 'error');
            return;
        }
        
        // SADECE tabloda var olan alanları gönder
        const formData = {
            user_id: currentUser.id,
            full_name: document.getElementById('visaFullName')?.value || '',
            passport_number: document.getElementById('visaPassportNumber')?.value || '',
            nationality: document.getElementById('visaNationality')?.value || '',
            date_of_birth: document.getElementById('visaDob')?.value || '',
            target_country: document.getElementById('visaCountry')?.value || '',
            visa_type: document.getElementById('visaType')?.value || '',
            total_price_eur: 80,
            status: 'pending',
            payment_status: 'pending',
            ai_score: 70,
            ai_risk_level: 'Medium'
        };
        
        // Boş alan kontrolü
        if (!formData.full_name || !formData.passport_number || !formData.target_country || !formData.visa_type) {
            showMessage('Lütfen tüm zorunlu alanları doldurun', 'error');
            return;
        }
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn?.innerHTML || 'Gönder';
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> Başvuru gönderiliyor...';
        }
        
        try {
            const { data, error } = await supabaseClient
                .from('visa_applications')
                .insert(formData)
                .select()
                .single();
            
            if (error) throw error;
            
            showMessage(`✅ Vize başvurunuz başarıyla alındı! Başvuru No: #${data.id}`, 'success');
            
            // Formu temizle
            e.target.reset();
            
            setTimeout(() => {
                loadPage('visa-applications');
            }, 2000);
            
        } catch (error) {
            console.error('Vize başvuru hatası:', error);
            showMessage('Başvuru gönderilemedi: ' + (error.message || 'Bilinmeyen hata'), 'error');
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }
    }
});

// Vize AI Skor Güncelleme (Basit versiyon)
function updateVisaAIScore() {
    const country = document.getElementById('visaCountry')?.value;
    const visaType = document.getElementById('visaType')?.value;
    
    if (!country || !visaType) return;
    
    let score = 70;
    
    // Vize tipine göre puanlama
    if (visaType === 'Tourist') score += 5;
    else if (visaType === 'Student') score += 10;
    else if (visaType === 'Work') score -= 5;
    else if (visaType === 'Family Reunion') score -= 10;
    
    // Ülkeye göre puanlama (basit)
    const highSuccessCountries = ['Spain', 'Greece', 'Portugal', 'Italy'];
    const lowSuccessCountries = ['USA', 'UK', 'Germany'];
    
    if (highSuccessCountries.includes(country)) score += 10;
    else if (lowSuccessCountries.includes(country)) score -= 10;
    
    const finalScore = Math.min(100, Math.max(0, score));
    
    const circle = document.getElementById('visaAIScoreCircle');
    const scoreValue = document.getElementById('visaAIScoreValue');
    const scoreLabel = document.getElementById('visaAIScoreLabel');
    const scoreDetail = document.getElementById('visaAIScoreDetail');
    
    if (circle) {
        const circumference = 263.9;
        const offset = circumference - (finalScore / 100) * circumference;
        circle.style.strokeDashoffset = offset;
    }
    if (scoreValue) scoreValue.textContent = finalScore;
    if (scoreLabel) {
        scoreLabel.innerHTML = finalScore >= 75 ? '✅ Yüksek Uygunluk' : (finalScore >= 50 ? '⚠️ Orta Uygunluk' : '❌ Düşük Uygunluk');
        scoreLabel.className = `mt-2 text-sm font-semibold ${finalScore >= 75 ? 'text-green-600' : (finalScore >= 50 ? 'text-yellow-600' : 'text-red-600')}`;
    }
    if (scoreDetail) scoreDetail.innerHTML = `📊 Tahmini başarı oranı: %${finalScore}`;
}

document.addEventListener('submit', async (e) => {

        const formData = {

        };
        
        // AI skorunu hesapla
        const aiScore = calculateVisaAIScore(formData);
        formData.ai_score = aiScore.score;

        const submitBtn = e.target.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="loading-spinner w-5 h-5"></div> Başvuru gönderiliyor...';
        
        try {
            const { data, error } = await supabaseClient
                .from('visa_applications')
                .insert(formData)
                .select()
                .single();
            
            if (error) throw error;
            
            showMessage(`✅ Vize başvurunuz başarıyla alındı! Başvuru No: #${data.id}`, 'success');
            
            setTimeout(() => {
                loadPage('visa-applications');
            }, 2000);
            
        } catch (error) {
            console.error('Vize başvuru hatası:', error);
            showMessage('Başvuru gönderilemedi: ' + error.message, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    }
});

function calculateVisaAIScore(formData) {
    let score = 70;
    
    // Pasaport kontrolü
    if (formData.passport_number?.match(/^[A-Z]{2}\d{8}$/)) score += 10;
    else if (formData.passport_number?.length > 5) score += 5;
    
    // Gelir kontrolü
    if (formData.monthly_income >= 2000) score += 10;
    else if (formData.monthly_income >= 1000) score += 5;
    
    // Vize tipi bazlı
    if (formData.visa_type === 'Tourist') score += 5;
    else if (formData.visa_type === 'Student') score += 10;
    else if (formData.visa_type === 'Work') score -= 5;
    
    const finalScore = Math.min(100, Math.max(0, score));
    const riskLevel = finalScore >= 75 ? 'Low' : (finalScore >= 50 ? 'Medium' : 'High');
    
    return { score: finalScore, riskLevel };
}
